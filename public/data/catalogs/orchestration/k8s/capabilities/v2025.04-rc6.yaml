title: CCC Kubernetes Capabilities
metadata:
    id: CCC.K8S.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2025.04-rc6
    description: Capabilities for Kubernetes technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2025.04-rc6
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
capabilities:
    - id: CCC.K8S.CP01
      title: Managed Kubernetes Control Plane
      description: |
        Provides a fully managed Kubernetes control plane that has
        high availability, with automatic updates and patching.
      group: Orchestration
    - id: CCC.K8S.CP02
      title: Managed Node Pool
      description: |
        Provides fully managed Kubernetes worker nodes (compute resources).
        These nodes are provisioned, updated, patched, and monitored for you
        by the service.
      group: Orchestration
    - id: CCC.K8S.CP03
      title: Virtual Nodes
      description: |
        Ability to have fully managed virtual compute resources to power Kubernetes
        worker nodes. This will eliminate the need to manage underlying nodes.
      group: Compute
    - id: CCC.K8S.CP04
      title: GPU Support
      description: |
        Support for GPU-accelerated workloads through integration of GPUs,
        enabling high-performance computing.
      group: Compute
    - id: CCC.K8S.CP05
      title: OCI Container Image Execution
      description: |
        Supports running containerized workloads using OCI-compliant images,
        providing an isolated execution environment for applications.
      group: Orchestration
    - id: CCC.K8S.CP06
      title: Container Registry Integration
      description: |
        Enables integration with public or private container registries to
        retrieve container images for execution.
      group: Orchestration
    - id: CCC.ContOrch.CP07
      title: Storage Integration
      description: |
        Supports attaching ephemeral or persistent storage volumes to running containers
        in the Kubernetes cluster.
      group: Data
    - id: CCC.K8S.CP08
      title: Built-in Ingress Load Balancing
      description: |
        Built-in support for distributes incoming traffic across running container
        instances to optimize resource usage and availability.
      group: Networking
    - id: CCC.ContOrch.CP09
      title: Cluster Auto Scaling
      description: |
        Ability to automatically scale the number of worker nodes in the cluster
        based on workload demand, ensuring efficient resource utilization.
      group: Resource
    - id: CCC.K8S.F10
      title: Private Cluster Endpoints
      description: |
        Ability to restrict access to the Kubernetes API server to private networks,
        ensuring the control plane is only accessible within your VPC.
      group: Networking
    - id: CCC.K8S.F11
      title: Service Mesh Integration
      description: |
        Ability to integrate with managed service mesh offering by the cloud
        service provider for service discovery, traffic routing, observability,
        and security.
      group: Networking
    - id: CCC.K8S.F12
      title: Secrets Integration
      description: |
        Ability to seamlessly integrate with cloud native secret manager service
        to securely manage and access secrets, such as API keys, database credentials,
        or certificates, within Kubernetes workloads.
      group: Access
    - id: CCC.K8S.F13
      title: Observability Tooling Integration
      description: |
        Ability integrate with Observability tooling such as Prometheus and Grafana
        to provide comprehensive monitoring, and visualization for Kubernetes clusters.
      group: Observability
groups:
    - id: Orchestration
      title: Orchestration
      description: |
        The Orchestration group covers entries related to coordinating and
        managing workloads across distributed systems. This includes container
        orchestration, job scheduling, CI/CD pipelines, build automation, and
        service mesh management.
    - id: Compute
      title: Compute
      description: |
        The Compute group covers entries related to processing, execution,
        and runtime infrastructure. This includes CPU, memory, storage allocation,
        network ports, command-line interfaces, and elastic scaling.
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
    - id: Networking
      title: Networking
      description: |
        The Networking group covers entries related to network infrastructure,
        connectivity, and traffic management. This includes virtual networks, subnets,
        load balancing, DNS, routing, peering, and network-level access controls.
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
