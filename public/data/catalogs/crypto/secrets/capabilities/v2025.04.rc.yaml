title: CCC Secrets Management Capabilities
metadata:
    id: CCC.SecMgmt.CP
    type: ControlCatalog
    gemara-version: v0
    description: Capabilities for Secrets Management technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
capabilities:
    - id: CCC.SecMgmt.CP01
      title: Secret Storage
      description: |
        Provides secure storage for sensitive data such as API keys, passwords, certificates, and other secrets.
      group: ""
    - id: CCC.SecMgmt.CP02
      title: Secret Creation - Plaintext
      description: |
        Ability to create new secrets as basic string data for storing
        sensitive data such as API keys and database credentials.
      group: ""
    - id: CCC.SecMgmt.CP03
      title: Secret Creation - JSON Objects
      description: |
        Ability to create new secrets as complex JSON objects with multiple fields for storing sensitive data.
      group: ""
    - id: CCC.SecMgmt.CP04
      title: Secret Creation - Binary Data
      description: |
        Ability to create new secrets as binary data for storing certificates and private keys.
      group: ""
    - id: CCC.SecMgmt.CP05
      title: Update Secrets
      description: |
        Ability to update a secret value or description after creation.
      group: ""
    - id: CCC.SecMgmt.CP06
      title: Soft Delete Secrets
      description: |
        Prevent secrets from being deleted immediately. Soft deletion
        makes secrets inaccessible and schedules them for deletion
        after a recovery window.
      group: ""
    - id: CCC.SecMgmt.CP07
      title: Automatic Secret Rotation
      description: |
        Supports automatic rotation of secrets based on a defined schedule or triggers to enhance security.
      group: ""
    - id: CCC.SecMgmt.CP08
      title: Secret Replication Policies
      description: |
        Allows configuration of secret replication policies to control
        replication of secrets, supporting compliance with data
        residency requirements.
      group: ""
    - id: CCC.SecMgmt.CP09
      title: Secure Secret Retrieval
      description: |
        Offers a secure API and SDK access for retrieving
        secrets, ensuring that secrets are transmitted
        securely to authorized clients.
      group: ""
imports:
    - entries:
        - reference-id: CCC.Core.CP01
          remarks: Encryption in Transit Enabled by Default
        - reference-id: CCC.Core.CP02
          remarks: Encryption at Rest Enabled by Default
        - reference-id: CCC.Core.CP03
          remarks: Access Log Publication
        - reference-id: CCC.Core.CP06
          remarks: Access Control
        - reference-id: CCC.Core.CP07
          remarks: Event Publication
        - reference-id: CCC.Core.CP09
          remarks: Metrics Publication
        - reference-id: CCC.Core.CP10
          remarks: Log Publication
        - reference-id: CCC.Core.CP11
          remarks: Backup
        - reference-id: CCC.Core.CP12
          remarks: Recovery
        - reference-id: CCC.Core.CP14
          remarks: API Access
        - reference-id: CCC.Core.CP18
          remarks: Resource Versioning
        - reference-id: CCC.Core.CP20
          remarks: Resource Tagging
        - reference-id: CCC.Core.CP28
          remarks: Command-line
        - reference-id: CCC.Core.CP30
          remarks: Passive Ingestion
      reference-id: CCC
