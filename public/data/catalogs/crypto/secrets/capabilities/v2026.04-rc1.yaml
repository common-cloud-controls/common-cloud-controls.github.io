title: CCC Secrets Management Capabilities
metadata:
    id: CCC.SecMgmt.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc1
    description: Capabilities for Secrets Management technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2026.04-rc1
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
capabilities:
    - id: CCC.SecMgmt.CP01
      title: Secret Storage
      description: |
        Provides secure storage for sensitive data such as API keys, passwords, certificates, and other secrets.
      group: Encryption
    - id: CCC.SecMgmt.CP02
      title: Secret Creation - Plaintext
      description: |
        Ability to create new secrets as basic string data for storing
        sensitive data such as API keys and database credentials.
      group: Encryption
    - id: CCC.SecMgmt.CP03
      title: Secret Creation - JSON Objects
      description: |
        Ability to create new secrets as complex JSON objects with multiple fields for storing sensitive data.
      group: Encryption
    - id: CCC.SecMgmt.CP04
      title: Secret Creation - Binary Data
      description: |
        Ability to create new secrets as binary data for storing certificates and private keys.
      group: Encryption
    - id: CCC.SecMgmt.CP05
      title: Update Secrets
      description: |
        Ability to update a secret value or description after creation.
      group: Encryption
    - id: CCC.SecMgmt.CP08
      title: Secret Replication Policies
      description: |
        Allows configuration of secret replication policies to control
        replication of secrets, supporting compliance with data
        residency requirements.
      group: Encryption
    - id: CCC.SecMgmt.CP09
      title: Secure Secret Retrieval
      description: |
        Offers a secure API and SDK access for retrieving
        secrets, ensuring that secrets are transmitted
        securely to authorized clients.
      group: Encryption
groups:
    - id: Encryption
      title: Encryption
      description: |
        The Encryption group covers entries related to
        protecting data confidentiality and integrity through cryptographic mechanisms.
        This includes encryption in transit and at rest, key management, and certificate
        lifecycle management.
