title: CCC Secrets Management Controls
metadata:
    id: CCC.SecMgmt.CN
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2025.04-rc6
    description: Controls for Secrets Management technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Controls
          title: CCC Core Controls
          version: v2025.04-rc6
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
controls:
    - id: CCC.SecMgmt.CN01
      title: Enforce Automatic Secret Rotation
      objective: |
        Ensure that secrets are automatically rotated on a defined schedule to
        reduce the risk of secret compromise and unauthorized access.
      group: Encryption
      assessment-requirements:
        - id: CCC.SecMgmt.CN01.AR01
          text: |
            Attempt to use an outdated version of a secret after its rotation period
            has passed and verify that access is denied.
          applicability:
            - tlp-red
            - tlp-amber
          state: Active
      state: Active
    - id: CCC.SecMgmt.CN02
      title: Enforce Secret Replication Policies
      objective: |
        Ensure that secrets are replicated only to authorized locations as per
        organizational data residency and compliance requirements.
      group: Data
      assessment-requirements:
        - id: CCC.SecMgmt.CN02.AR01
          text: |
            Attempt to retrieve a secret from an unauthorized region and verify that access is denied.
          applicability:
            - tlp-red
            - tlp-amber
          state: Active
      state: Active
groups:
    - id: Encryption
      title: Encryption
      description: |
        The Encryption group covers entries related to
        protecting data confidentiality and integrity through cryptographic mechanisms.
        This includes encryption in transit and at rest, key management, and certificate
        lifecycle management.
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
imports:
    - entries: []
      reference-id: CCC.Core.Controls
