title: CCC Key Management Controls
metadata:
    id: CCC.KeyMgmt.CN
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc4
    description: Controls for Key Management technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Controls
          title: CCC Core Controls
          version: v2026.04-rc4
controls:
    - id: CCC.KeyMgmt.CN01
      title: Alert on Key-version Changes
      objective: |
        Generate near-real-time alerts when a KMS key version is disabled or scheduled for deletion, enabling rapid investigation and recovery.
      group: Observability
      assessment-requirements:
        - id: CCC.KeyMgmt.CN01.AR01
          text: |
            When a key version is scheduled for deletion or disabled, an
            alert MUST be generated within five minutes.
          applicability:
            - tlp-amber
            - tlp-red
          recommendation: Use native event services (e.g., CloudWatch Events, Azure Monitor, Cloud Audit Logs) to route notifications to an incident-response channel.
          state: Active
      state: Active
    - id: CCC.KeyMgmt.CN02
      title: Limit Decrypt Permissions
      objective: |
        Restrict the Decrypt operation to authorised principals only, applying the principle of least privilege to protect sensitive data.
      group: Access
      assessment-requirements:
        - id: CCC.KeyMgmt.CN02.AR01
          text: |
            When IAM roles and key policies are reviewed, Decrypt permission
            MUST be granted exclusively to documented authorised principals.
          applicability:
            - tlp-green
          recommendation: Periodically audit policy documents via automated tooling and report any deviations.
          state: Active
      state: Active
    - id: CCC.KeyMgmt.CN03
      title: Enforce Automatic Rotation
      objective: |
        Ensure symmetric keys rotate automatically within policy intervals to reduce exposure of key material.
      group: Encryption
      assessment-requirements:
        - id: CCC.KeyMgmt.CN03.AR01
          text: |
            When rotation settings are examined, rotation MUST be enabled with
            an interval not exceeding 365 days.
          applicability:
            - tlp-green
          recommendation: Use cloud-provider rotation features and verify via configuration scanning.
          state: Active
      state: Active
    - id: CCC.KeyMgmt.CN04
      title: Validate Imported Keys
      objective: |
        Accept only externally generated keys that meet approved cryptographic strength and provenance requirements.
      group: Encryption
      assessment-requirements:
        - id: CCC.KeyMgmt.CN04.AR01
          text: |
            When a key import request is processed, the key MUST use an
            approved algorithm (RSA-2048+, EC-P256+) and originate from a
            certified HSM.
          applicability:
            - tlp-green
          recommendation: Implement an approval workflow that validates attestation data before import.
          state: Active
      state: Active
groups:
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Encryption
      title: Encryption
      description: |
        The Encryption group covers entries related to
        protecting data confidentiality and integrity through cryptographic mechanisms.
        This includes encryption in transit and at rest, key management, and certificate
        lifecycle management.
imports:
    - entries:
        - reference-id: CCC.Core.CN01
          remarks: Prevent unencrypted requests
        - reference-id: CCC.Core.CN02
          remarks: Ensure Data Encryption at Rest for All Stored Data
        - reference-id: CCC.Core.CN03
          remarks: Implement multi-factor authentication (MFA) for access
        - reference-id: CCC.Core.CN04
          remarks: Log all access and changes
        - reference-id: CCC.Core.CN05
          remarks: Prevent access from untrusted entities
        - reference-id: CCC.Core.CN06
          remarks: Prevent deployment in restricted regions
        - reference-id: CCC.Core.CN10
          remarks: Prevent Data Replication to Destinations Outside Perimeter
      reference-id: CCC.Core.Controls
