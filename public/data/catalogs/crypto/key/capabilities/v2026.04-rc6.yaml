title: CCC Key Management Capabilities
metadata:
    id: CCC.KeyMgmt.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc6
    description: Capabilities for Key Management technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2026.04-rc6
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
capabilities:
    - id: CCC.KeyMgmt.CP01
      title: AES-256
      description: |
        Support for the AES-256 Advanced Encryption Standard with a 256-bit key for encryption and decryption.
      group: Encryption
    - id: CCC.KeyMgmt.CP02
      title: RSA-2048
      description: |
        Supports the RSA algorithm with a key size of 2048 bits for encryption and digital signatures.
      group: Encryption
    - id: CCC.KeyMgmt.CP03
      title: RSA-3072
      description: |
        Supports the RSA algorithm with a key size of 3072 bits for encryption and digital signatures.
      group: Encryption
    - id: CCC.KeyMgmt.CP04
      title: RSA-4096
      description: |
        Supports the RSA algorithm with a key size of 4096 bits for encryption and digital signatures.
      group: Encryption
    - id: CCC.KeyMgmt.CP05
      title: EC-P256
      description: |
        Supports the elliptic curve signing algorithm using the P-256 Curve for digital signatures.
      group: Encryption
    - id: CCC.KeyMgmt.CP06
      title: EC-P256K
      description: |
        Supports the elliptic curve signing algorithm using the Secp256k1 Curve for digital signatures.
      group: Encryption
    - id: CCC.KeyMgmt.CP07
      title: EC-P384
      description: |
        Supports the elliptic curve signing algorithm using the P-384 Curve for digital signatures.
      group: Encryption
    - id: CCC.KeyMgmt.CP08
      title: Key Creation
      description: |
        Supports secure key creation within the key management service using the supported algorithms.
      group: Encryption
    - id: CCC.KeyMgmt.CP09
      title: Encrypt data
      description: |
        Provides the ability to securely encrypt data using a managed key in the supported encryption algorithms.
      group: Encryption
    - id: CCC.KeyMgmt.CP10
      title: Decrypt data
      description: |
        Provides the ability to securely decrypt data using a managed key in the supported encryption algorithms.
      group: Encryption
    - id: CCC.KeyMgmt.CP11
      title: Create Digital Signature
      description: |
        Supports the generation of a digital signature for data using the supported signing algorithms.
      group: Encryption
    - id: CCC.KeyMgmt.CP12
      title: Verify Digital Signature
      description: |
        Supports the verification of the digital signature of some data using the supported signing algorithms.
      group: Encryption
    - id: CCC.KeyMgmt.CP13
      title: Supports FIPS 140-2 Level 3
      description: |
        Supports FIPS 140-2 Level 3 certified Hardware Security Modules (HSM).
      group: Encryption
    - id: CCC.KeyMgmt.CP14
      title: Key Versioning
      description: |
        Provides the ability to manage multiple versions of a key.
      group: Encryption
    - id: CCC.KeyMgmt.CP15
      title: Key label
      description: |
        Supports the ability to tag a managed key with user defined labels.
      group: Encryption
    - id: CCC.KeyMgmt.CP16
      title: Disable key
      description: |
        Supports the ability to disable a managed key without deletion.
      group: Encryption
    - id: CCC.KeyMgmt.CP17
      title: Enable key
      description: |
        Supports the ability to re-enable a disabled managed key.
      group: Encryption
    - id: CCC.KeyMgmt.CP19
      title: Delete Key
      description: |
        Supports the ability to permanently delete a managed key after the grace period defined on soft delete.
      group: Encryption
    - id: CCC.KeyMgmt.CP22
      title: Key Import
      description: |
        Supports the ability to import externally generated keys into the KMS.
      group: Encryption
    - id: CCC.KeyMgmt.CP23
      title: Key Expiry
      description: |
        Supports the ability to set an expiration date for a key
      group: Encryption
    - id: CCC.KeyMgmt.CP24
      title: Key Replication
      description: |
        Supports the ability to securely replicate a key across different regions using automated or manual process.
      group: Encryption
groups:
    - id: Encryption
      title: Encryption
      description: |
        The Encryption group covers entries related to
        protecting data confidentiality and integrity through cryptographic mechanisms.
        This includes encryption in transit and at rest, key management, and certificate
        lifecycle management.
imports:
