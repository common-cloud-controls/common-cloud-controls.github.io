title: CCC Load Balancer Threats
metadata:
    id: CCC.LB.TH
    type: ThreatCatalog
    gemara-version: v1.0.0
    version: v2025.04-rc6
    description: Threats for Load Balancer technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Threats
          title: CCC Core Threats
          version: v2025.04-rc6
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
groups:
    - id: ungrouped
      title: Ungrouped
      description: ""
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
    - id: Networking
      title: Networking
      description: |
        The Networking group covers entries related to network infrastructure,
        connectivity, and traffic management. This includes virtual networks, subnets,
        load balancing, DNS, routing, peering, and network-level access controls.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
    - id: Encryption
      title: Encryption
      description: |
        The Encryption group covers entries related to
        protecting data confidentiality and integrity through cryptographic mechanisms.
        This includes encryption in transit and at rest, key management, and certificate
        lifecycle management.
imports:
    - entries:
        - reference-id: CCC.Core.TH01
          remarks: Access Control is Misconfigured
        - reference-id: CCC.Core.TH02
          remarks: Data is Intercepted in Transit
        - reference-id: CCC.Core.TH06
          remarks: Data is Lost or Corrupted
        - reference-id: CCC.Core.TH07
          remarks: Logs are Tampered With or Deleted
        - reference-id: CCC.Core.TH09
          remarks: Logs or Monitoring Data are Read by Unauthorized Users
        - reference-id: CCC.Core.TH12
          remarks: Resource Constraints are Exhausted
        - reference-id: CCC.Core.TH13
          remarks: Resource Tags are Manipulated
        - reference-id: CCC.Core.TH15
          remarks: Automated Enumeration and Reconnaissance by Non-human
        - reference-id: CCC.Core.TH16
          remarks: Logging and Monitoring are Disabled
        - reference-id: CCC.Core.TH17
          remarks: Unauthorized Network Access via Misconfigured Rules
        - reference-id: CCC.Core.TH18
          remarks: Encryption Key is Misused
        - reference-id: CCC.Core.TH19
          remarks: Metrics are Read by Unauthorized Entities
        - reference-id: CCC.Core.TH20
          remarks: Logging or Audit Coverage is Insufficient
        - reference-id: CCC.Core.TH21
          remarks: Sensitive Data is Exposed in Logs or Metrics
        - reference-id: CCC.Core.TH22
          remarks: Log Delivery is Delayed or Degraded
        - reference-id: CCC.Core.TH24
          remarks: Insecure Defaults Enable Unauthorized Access
      reference-id: CCC.Core.Threats
threats:
    - id: CCC.LB.TH01
      title: Unrestricted Request Traffic Overwhelms Downstream Services
      description: |
        Absence of filtering or rate limiting permits malicious traffic to
        overload downstream services and facilitates brute-force activity.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP04
              remarks: Transaction Rate Limits
          reference-id: CCC.Core.Capabilities
        - entries:
            - reference-id: CCC.LB.CP22
              remarks: Rate Limiting / Throttling
          reference-id: LB
    - id: CCC.LB.TH03
      title: Traffic Distribution Is Manipulated
      description: |
        Adjusting distribution policies can concentrate traffic on specific nodes
        causing DoS or redirect flows through unwanted paths.
      group: Networking
      capabilities:
        - entries:
            - reference-id: CCC.LB.CP02
              remarks: Dynamic LB
            - reference-id: CCC.LB.CP20
              remarks: Traffic Splitting
          reference-id: LB
    - id: CCC.LB.TH04
      title: Session Persistence Is Exploited
      description: |
        Improper session-affinity settings can enable session fixation or
        hijacking across backend targets.
      group: Access
      capabilities:
        - entries:
            - reference-id: CCC.LB.CP15
              remarks: Session Affinity
          reference-id: LB
    - id: CCC.LB.TH05
      title: Health Checks Are Exploited to Take Services Offline
      description: |
        Manipulating health-check endpoints or responses can cause healthy
        targets to be marked unavailable, leading to denial of service.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.LB.CP12
              remarks: Health Checks
            - reference-id: CCC.LB.CP13
              remarks: Target Removal
          reference-id: LB
    - id: CCC.LB.TH06
      title: Sensitive Metadata Exposure via HTTP Headers
      description: |
        Response headers may reveal software versions, internal IPs, or other
        metadata useful for reconnaissance.
      group: Data
      capabilities:
        - entries:
            - reference-id: CCC.LB.CP19
          reference-id: LBL
    - id: CCC.LB.TH07
      title: TLS Certificates Are Expired or Invalid
      description: |
        Stale or untrusted certificates weaken encrypted-traffic protection.
      group: Encryption
      capabilities:
        - entries:
            - reference-id: CCC.LB.CP11
              remarks: SSL/TLS Termination
          reference-id: LB
