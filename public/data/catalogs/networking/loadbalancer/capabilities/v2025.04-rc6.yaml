title: CCC Load Balancer Capabilities
metadata:
    id: CCC.LB.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2025.04-rc6
    description: Capabilities for Load Balancer technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2025.04-rc6
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
capabilities:
    - id: CCC.LB.CP01
      title: Static Load Balancing
      description: |
        Employ load balancing algorithms that follow fixed rules,
        independent of the current server state.
      group: Networking
    - id: CCC.LB.CP02
      title: Dynamic Load Balancing
      description: |
        Employ load balancing algorithms that consider the current state
        of servers before distributing traffic. Load balancer adjusts traffic
        distribution in real-time based on the current server health, resource
        utilization, and traffic conditions.
      group: Networking
    - id: CCC.LB.CP03
      title: Layer 7 Routing
      description: |
        Providing distribution of incoming traffic based on the application layer
        or layer 7 (on ISO model) information. Some of the supported protocols on
        layer 7 are HTTP, HTTPS, HTTP/2, gRPC, and WebSockets.
      group: Networking
    - id: CCC.LB.CP04
      title: Layer 4 Routing
      description: |
        Providing distribution of incoming traffic based on the
        transport layer or layer 4 (on ISO model) information. It uses
        the combination of IP addresses and TCP/UDP port to distribute incoming
        traffic rather than inspecting the actual content of the packets.
      group: Networking
    - id: CCC.LB.CP05
      title: URL-Based Routing
      description: |
        Direct incoming requests to different backend resources based on
        the content of the request URL.
      group: Networking
    - id: CCC.LB.CP06
      title: HTTP Header-Based Routing
      description: |
        Direct incoming requests to different backend resources based on
        the values of HTTP headers.
      group: Networking
    - id: CCC.LB.CP07
      title: WebSocket Support
      description: |
        Ability to support web socket communication.
      group: Networking
    - id: CCC.LB.CP08
      title: Dual-stack Load Balancing
      description: |
        Ability to support traffic originated from both IPv4 and IPv6.
      group: Networking
    - id: CCC.LB.CP09
      title: Load Balancer Autoscaling
      description: |
        Ability for the load balancer to dynamically adjust its capacity
        in response to fluctuations in incoming traffic.
      group: Resource
    - id: CCC.LB.CP10
      title: Target Autoscaling
      description: |
        Ability for the load balancer to trigger scaling actions of the
        backend instances (targets) to handle fluctuations in incoming traffic.
      group: Resource
    - id: CCC.LB.CP11
      title: SSL/TLS Termination
      description: |
        Process of decrypting SSL or TLS encrypted traffic at the load balancer
        level rather than at the backend servers. This allows the load balancer
        to offload the decryption task from the backend servers.
      group: Encryption
    - id: CCC.LB.CP12
      title: Target Health Checks
      description: |
        Ability to continuously perform health checks on backend backend targets
        in form of checking the response to HTTP request, TCP connection or checking
        other application-specific parameter
      group: Observability
    - id: CCC.LB.CP13
      title: Health Checks-based Target Removal
      description: |
        If the health check detects that a backend target is unhealthy
        the load balancer will remove that unhealthy target from its list
        of available backend instances. This ensures that traffic is no longer
        routed to the unhealthy target.
      group: Networking
    - id: CCC.LB.CP14
      title: Retries
      description: |
        Ability to retry delivery of failed requests to targets. The conditions
        under which the load balancer retries, how long to wait before retrying,
        and the maximum number of retries permitted are configurable.
      group: Networking
    - id: CCC.LB.CP15
      title: Session Affinity
      description: |
        Can configure subsequent requests from an initial client to be
        passed to the same target.
      group: Networking
    - id: CCC.LB.CP16
      title: URL Redirects
      description: |
        Redirect incoming traffic to a different URL or location.
      group: Networking
    - id: CCC.LB.CP17
      title: URL Rewrites
      description: |
        Rewrite URL paths before forwarding them to backend services.
      group: Networking
    - id: CCC.LB.CP18
      title: Custom Response
      description: |
        Ability to configure specific HTTP responses to be returned by
        the load balancer under defined conditions.
      group: Networking
    - id: CCC.LB.CP19
      title: Request and Response Header Transformations
      description: |
        Ability to modify HTTP headers of both incoming requests and outgoing
        responses.
      group: Networking
    - id: CCC.LB.CP20
      title: Traffic Splitting / Weighted Routing
      description: |
        Can distribute incoming traffic across multiple backend resources
        based on predefined weights or percentages (e.g., for canary
        deployments, A/B testing, blue-green deployments, or gradual
        traffic migrations).
      group: Networking
    - id: CCC.LB.CP21
      title: Traffic Mirroring
      description: |
        Can duplicate incoming network traffic and send it to a secondary
        destination for monitoring, analysis, or testing purposes.
      group: Networking
    - id: CCC.LB.CP22
      title: Rate Limiting / Throttling
      description: |
        Ability to limit the number of requests per second per client. This
        ensures that no single client or user overloads the backend servers,
        distributing requests fairly across multiple instances.
      group: Networking
    - id: CCC.LB.CP23
      title: Firewall Integration
      description: |
        Ability to seamlessly integrate with firewall services to ensure only
        legitimate and secure traffic reaches backend servers, blocking malicious
        requests.
      group: Networking
groups:
    - id: Networking
      title: Networking
      description: |
        The Networking group covers entries related to network infrastructure,
        connectivity, and traffic management. This includes virtual networks, subnets,
        load balancing, DNS, routing, peering, and network-level access controls.
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
    - id: Encryption
      title: Encryption
      description: |
        The Encryption group covers entries related to
        protecting data confidentiality and integrity through cryptographic mechanisms.
        This includes encryption in transit and at rest, key management, and certificate
        lifecycle management.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
