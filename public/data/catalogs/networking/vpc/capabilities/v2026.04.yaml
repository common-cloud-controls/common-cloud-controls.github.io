title: CCC Virtual Private Cloud Capabilities
metadata:
    id: CCC.VPC.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04
    description: Capabilities for Virtual Private Cloud technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2026.04
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
capabilities:
    - id: CCC.VPC.CP01
      title: Isolated Custom Network Creation
      description: |
        Ability to create a virtual network that is isolated from other users of the same
        public cloud.
      group: Networking
    - id: CCC.VPC.CP02
      title: IPv4 CIDR Block
      description: |
        Ability to specify a IPv4 CIDR block to the virtual network.
      group: Networking
    - id: CCC.VPC.CP03
      title: IPv6 CIDR Block
      description: |
        Ability to specify a IPv6 CIDR block to the virtual network.
      group: Networking
    - id: CCC.VPC.CP04
      title: Public Subnet Creation
      description: |
        Ability to create a subnet that allows resources within the subnet to
        communicate with the public internet.
      group: Networking
    - id: CCC.VPC.CP05
      title: Private Subnet Creation
      description: |
        Ability to create a subnet that resources within the subnet cannot directly
        access the public internet.
      group: Networking
    - id: CCC.VPC.CP06
      title: Multiple Availability Zones for Subnets
      description: |
        Ability to spread the subnets in more than one availability zones.
      group: Networking
    - id: CCC.VPC.CP07
      title: Routing Control
      description: |
        Ability to control traffic within the VPC and between the VPC and the
        internet or on-premises networks using customizable route tables.
      group: Networking
    - id: CCC.VPC.CP08
      title: Connectivity Options - Internet Gateway
      description: |
        Enables direct internet access for resources within a VPC.
      group: Networking
    - id: CCC.VPC.CP09
      title: Connectivity Options - NAT Gateways
      description: |
        Allows instances in private subnets to access the internet without
        exposing them to inbound internet traffic.
      group: Networking
    - id: CCC.VPC.CP10
      title: Connectivity Options - Private Connection
      description: |
        Dedicated, private, high-speed connections between on-premises
         networks and cloud VPC.
      group: Networking
    - id: CCC.VPC.CP11
      title: Connectivity Options - VPC Peering
      description: |
        Establishing a private connection between two VPCs to
        communicate seamlessly.
      group: Networking
    - id: CCC.VPC.CP12
      title: Connectivity Options - Transit Gateways
      description: |
        A hub-and-spoke model for connecting multiple VPCs and
        on-premises networks.
      group: Networking
    - id: CCC.VPC.CP13
      title: Connectivity Options - Site-to-site VPN
      description: |
        Provides an encrypted connection over the internet between
        a VPC and an on-premises network.
      group: Networking
    - id: CCC.VPC.CP14
      title: Built-in DNS Resolution
      description: |
        Resolves hostnames to IP addresses for instances within the VPC
         allowing instances to communicate using hostnames instead of IP addresses.
      group: Networking
    - id: CCC.VPC.CP15
      title: Built-in DHCP Resolution
      description: |
        Automatically assign IP addresses, subnet masks, default gateways
        and other network configurations to instances within the VPC.
      group: Networking
    - id: CCC.VPC.CP16
      title: Flow Logs
      description: |
        Ability to capture information about the IP traffic going through the VPC.
      group: Observability
    - id: CCC.VPC.CP17
      title: VPC Endpoints
      description: |
        Ability to allow secure, private connectivity between resources within a VPC
        and other services without the need for a public internet.
      group: Networking
groups:
    - id: Networking
      title: Networking
      description: |
        The Networking group covers entries related to network infrastructure,
        connectivity, and traffic management. This includes virtual networks, subnets,
        load balancing, DNS, routing, peering, and network-level access controls.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
imports:
    - entries:
        - reference-id: CCC.Core.CP06
          remarks: Access Control
        - reference-id: CCC.Core.CP08
