title: CCC Virtual Private Cloud Controls
metadata:
    id: CCC.VPC.CN
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc5
    description: Controls for Virtual Private Cloud technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Controls
          title: CCC Core Controls
          version: v2026.04-rc5
controls:
    - id: CCC.VPC.CN01
      title: Restrict Default Network Creation
      objective: |
        Restrict the automatic creation of default virtual networks and related
        resources during subscription initialization to avoid insecure default
        configurations and enforce custom network policies.
      group: Resource
      assessment-requirements:
        - id: CCC.VPC.CN01.AR01
          text: |
            When a subscription is created, the subscription MUST NOT
            contain default network resources.
          applicability:
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
    - id: CCC.VPC.CN02
      title: Limit Resource Creation in Public Subnet
      objective: |
        Restrict the creation of resources in the public subnet with
        direct access to the internet to minimize attack surfaces.
      group: Networking
      assessment-requirements:
        - id: CCC.VPC.CN02.AR01
          text: |
            When a resource is created in a public subnet, that resource
            MUST NOT be assigned an external IP address by default.
          applicability:
            - tlp-red
          state: Active
      state: Active
    - id: CCC.VPC.CN03
      title: Restrict VPC Peering to Authorized Accounts
      objective: |
        Ensure VPC peering connections are only established with explicitly
        authorized destinations to limit network exposure and enforce boundary
        controls.
      group: Access
      assessment-requirements:
        - id: CCC.VPC.CN03.AR01
          text: |
            When a VPC peering connection is requested, the service MUST
            prevent connections from VPCs that are not explicitly
            allowed.
          applicability:
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
    - id: CCC.VPC.CN04
      title: Enforce VPC Flow Logs on VPCs
      objective: |
        Ensure VPCs are configured with flow logs enabled to capture traffic
        information.
      group: Observability
      assessment-requirements:
        - id: CCC.VPC.CN04.AR01
          text: |
            When any network traffic goes to or from an interface in the VPC,
            the service MUST capture and log all relevant information.
          applicability:
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
groups:
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
    - id: Networking
      title: Networking
      description: |
        The Networking group covers entries related to network infrastructure,
        connectivity, and traffic management. This includes virtual networks, subnets,
        load balancing, DNS, routing, peering, and network-level access controls.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
imports:
    - entries:
        - reference-id: CCC.Core.CN01
          remarks: Prevent Unencrypted Requests
        - reference-id: CCC.Core.CN03
          remarks: Implement Multi-factor Authentication (MFA) for Access
        - reference-id: CCC.Core.CN04
          remarks: Log All Access and Changes
        - reference-id: CCC.Core.CN05
          remarks: Prevent Access from Untrusted Entities
        - reference-id: CCC.Core.CN06
          remarks: Prevent Deployment in Restricted Regions
        - reference-id: CCC.Core.CN07
          remarks: Alert on Unusual Enumeration Activity
        - reference-id: CCC.Core.CN09
          remarks: Prevent Tampering, Deletion, or Unauthorized Access to Access Logs
      reference-id: CCC.Core.Controls
