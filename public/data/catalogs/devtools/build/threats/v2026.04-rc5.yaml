title: CCC Build Systems Threats
metadata:
    id: CCC.Build.TH
    type: ThreatCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc5
    description: Threats for Build Systems technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Threats
          title: CCC Core Threats
          version: v2026.04-rc5
groups:
    - id: ungrouped
      title: Ungrouped
      description: ""
    - id: Orchestration
      title: Orchestration
      description: |
        The Orchestration group covers entries related to coordinating and
        managing workloads across distributed systems. This includes container
        orchestration, job scheduling, CI/CD pipelines, build automation, and
        service mesh management.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
imports:
    - entries:
        - reference-id: CCC.Core.TH01
          remarks: Access control is misconfigured
        - reference-id: CCC.Core.TH02
          remarks: Data is intercepted in transit
        - reference-id: CCC.Core.TH03
          remarks: Deployment region network is untrusted
        - reference-id: CCC.Core.TH04
          remarks: Data is replicated to untrusted or external locations
        - reference-id: CCC.Core.TH05
          remarks: Data is corrupted during replication
        - reference-id: CCC.Core.TH06
          remarks: Data is lost or corrupted
        - reference-id: CCC.Core.TH07
          remarks: Logs are Tampered With or Deleted
        - reference-id: CCC.Core.TH09
          remarks: Logs or Monitoring Data are Read by Unauthorized Users
        - reference-id: CCC.Core.TH11
          remarks: Event Notifications are Incorrectly Triggered
        - reference-id: CCC.Core.TH12
          remarks: Resource constraints are exhausted
        - reference-id: CCC.Core.TH14
          remarks: Older Resource Versions Are Exploited
        - reference-id: CCC.Core.TH15
          remarks: Automated Enumeration and Reconnaissance by Non-Human Entities
        - reference-id: CCC.Core.TH16
          remarks: Logging and Monitoring are Disabled
      reference-id: CCC.Core.Threats
threats:
    - id: CCC.Build.TH01
      title: Unauthorized Build Execution
      description: |
        Attackers may trigger builds using unauthorized build agents or external services,
        leading to unauthorized code execution or deployment of malicious code.
      group: Orchestration
      capabilities:
        - entries:
            - reference-id: CCC.Build.CP01
            - reference-id: CCC.Build.CP04
          reference-id: CCC.Build.Capabilities
    - id: CCC.Build.TH02
      title: External Exposure of Build Environments
      description: |
        If build environments have external network access, they may be accessed by unauthorized parties,
        leading to data exfiltration or tampering.
      group: Access
      capabilities:
        - entries:
            - reference-id: CCC.Build.CP03
          reference-id: CCC.Build.Capabilities
