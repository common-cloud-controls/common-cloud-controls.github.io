title: CCC Container Registry Threats
metadata:
    id: CCC.CntrReg.TH
    type: ThreatCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc5
    description: Threats for Container Registry technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Threats
          title: CCC Core Threats
          version: v2026.04-rc5
groups:
    - id: ungrouped
      title: Ungrouped
      description: ""
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
imports:
    - entries:
        - reference-id: CCC.Core.TH01
          remarks: Access control is misconfigured
        - reference-id: CCC.Core.TH02
          remarks: Data is intercepted in transit
        - reference-id: CCC.Core.TH03
          remarks: Deployment region network is untrusted
        - reference-id: CCC.Core.TH04
          remarks: Data is replicated to untrusted or external locations
        - reference-id: CCC.Core.TH05
          remarks: Data is corrupted during replication
        - reference-id: CCC.Core.TH06
          remarks: Data is lost or corrupted
        - reference-id: CCC.Core.TH07
          remarks: Logs are Tampered With or Deleted
        - reference-id: CCC.Core.TH09
          remarks: Logs or Monitoring Data are Read by Unauthorized Users
        - reference-id: CCC.Core.TH11
          remarks: Event Notifications are Incorrectly Triggered
        - reference-id: CCC.Core.TH12
          remarks: Resource constraints are exhausted
        - reference-id: CCC.Core.TH14
          remarks: Older Resource Versions Are Exploited
        - reference-id: CCC.Core.TH15
          remarks: Automated Enumeration and Reconnaissance by Non-Human Entities
        - reference-id: CCC.Core.TH16
          remarks: Logging and Monitoring are Disabled
        - reference-id: CCC.Core.TH23
          remarks: Retention or Lifecycle Policies are Misconfigured
      reference-id: CCC.Core.Threats
threats:
    - id: CCC.CntrReg.TH01
      title: Vulnerabilities in Artifacts are Exploited
      description: |
        Attackers exploit known vulnerabilities in container images or artifacts stored in
        the registry, leading to unauthorized access, data breaches, or system compromise.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.CntrReg.CP05
          reference-id: CCC.CntrReg.Capabilities
