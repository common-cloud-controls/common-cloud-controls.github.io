title: CCC Container Registry Capabilities
metadata:
    id: CCC.CntrReg.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2025.04-rc6
    description: Capabilities for Container Registry technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2025.04-rc6
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
capabilities:
    - id: CCC.CntrReg.CP01
      title: Image Storage
      description: |
        Ability to upload and securely store container images and image metadata.
      group: Resource
    - id: CCC.CntrReg.CP02
      title: Private Repositories
      description: |
        Support for creating container image repositories that are restricted and
        only accessible by authorized users or services.
      group: Access
    - id: CCC.CntrReg.CP03
      title: Public Repositories
      description: |
        Support for creating container image repositories that are open to the public.
        These repositories are used mainly for sharing container images.
      group: Access
    - id: CCC.CntrReg.CP05
      title: Image Scanning
      description: |
        Provides vulnerability scanning for container images (built-in
        or through integration to scanning services) to detect security
        issues and generate reports for known CVEs (Common Vulnerabilities
        and Exposures).
      group: Observability
    - id: CCC.CntrReg.CP06
      title: Integration with CI/CD Tooling
      description: |
        Seamlessly integrates with CI/CD pipelines to automate pushing and pulling of
        container images.
      group: Orchestration
    - id: CCC.CntrReg.CP07
      title: Caching of Images
      description: |
        Provides caching for faster access to frequently used images.
      group: Resource
    - id: CCC.CntrReg.CP08
      title: Multi-platform Support
      description: |
        Ability to store images built for different CPU architectures such as
        x86_64 (AMD/Intel), ARM64, and others within the same container image
        repository.
      group: Resource
    - id: CCC.CntrReg.CP10
      title: List Repositories
      description: |
        Ability to list all public and private repositories in the container
        image registry.
      group: Resource
    - id: CCC.CntrReg.CP11
      title: Edit Repository
      description: |
        Ability to edit a public or private container image repository properties
        after being created.
      group: Resource
    - id: CCC.CntrReg.CP12
      title: Delete Repository
      description: |
        Ability to delete a public or private container image repository after
        being created.
      group: Resource
    - id: CCC.CntrReg.CP13
      title: List Images
      description: |
        Ability to list container images in a public or private container image
        repository.
      group: Resource
    - id: CCC.CntrReg.CP14
      title: Delete Image
      description: |
        Ability to delete a container image after being created.
      group: Resource
    - id: CCC.CntrReg.CP15
      title: List Lifecycle Policies
      description: |
        Ability to list lifecycle policies for container images in a public or private
        container repository.
      group: Resource
    - id: CCC.CntrReg.CP16
      title: Edit Lifecycle Policy
      description: |
        Ability to edit a lifecycle policy after being created.
      group: Resource
    - id: CCC.CntrReg.CP17
      title: Delete Lifecycle Policy
      description: |
        Ability to delete a lifecycle policy after being created.
      group: Resource
groups:
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
    - id: Orchestration
      title: Orchestration
      description: |
        The Orchestration group covers entries related to coordinating and
        managing workloads across distributed systems. This includes container
        orchestration, job scheduling, CI/CD pipelines, build automation, and
        service mesh management.
