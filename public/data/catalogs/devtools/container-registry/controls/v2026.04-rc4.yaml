title: CCC Container Registry Controls
metadata:
    id: CCC.CntrReg.CN
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc4
    description: Controls for Container Registry technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Controls
          title: CCC Core Controls
          version: v2026.04-rc4
controls:
    - id: CCC.CntrReg.CN01
      title: Implement Vulnerability Scanning for Artifacts
      objective: |
        Ensure that container images and artifacts stored in the container registry are scanned for
        vulnerabilities to identify and remediate security issues before deployment.
      group: Observability
      assessment-requirements:
        - id: CCC.CntrReg.CN01.AR01
          text: |
            Attempt to push an artifact with known vulnerabilities to the registry
            and observe if it is flagged or rejected by the vulnerability scanning process.
          applicability:
            - tlp-red
            - tlp-amber
          state: Active
      state: Active
    - id: CCC.CntrReg.CN02
      title: Implement Cleanup Policies for Artifacts
      objective: |
        Ensure that unused or outdated artifacts are cleaned up according to defined policies to
        manage storage effectively and reduce security risks associated with outdated versions.
      group: Resource
      assessment-requirements:
        - id: CCC.CntrReg.CN02.AR01
          text: |
            Confirm that artifacts older than the specified retention period are automatically
            deleted from the registry.
          applicability:
            - tlp-red
            - tlp-amber
          state: Active
      state: Active
groups:
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
imports:
    - entries:
        - reference-id: CCC.Core.CN01
          remarks: Prevent unencrypted requests
        - reference-id: CCC.Core.CN02
          remarks: Ensure data encryption at rest for all stored data
        - reference-id: CCC.Core.CN04
          remarks: Log all access and changes
        - reference-id: CCC.Core.CN05
          remarks: Prevent access from untrusted entities
        - reference-id: CCC.Core.CN06
          remarks: Prevent deployment in restricted regions
        - reference-id: CCC.Core.CN09
          remarks: Prevent tampering, deletion, or unauthorized access to access logs
        - reference-id: CCC.Core.CN10
          remarks: Prevent data replication to destinations outside of defined trust perimeter
      reference-id: CCC.Core.Controls
