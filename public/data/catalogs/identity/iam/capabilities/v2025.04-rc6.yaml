title: CCC Identity and Access Management Capabilities
metadata:
    id: CCC.IAM.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2025.04-rc6
    description: Capabilities for Identity and Access Management technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2025.04-rc6
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
capabilities:
    - id: CCC.IAM.CP01
      title: Global Identities
      description: |
        IAM identities are global across all regions. They are created
        and managed from a single global namespace.
      group: Access
    - id: CCC.IAM.CP02
      title: IAM Users
      description: |
        Ability to create, manage, list and delete IAM users.
        IAM user represents a single person or application.
      group: Access
    - id: CCC.IAM.CP03
      title: Long-Term Credentials
      description: |
        Ability to create, manage, list and delete long-term
        credentials such as access keys and service account keys.
      group: Access
    - id: CCC.IAM.CP04
      title: Password Management
      description: |
        Ability to create, change and delete IAM user passwords.
      group: Access
    - id: CCC.IAM.CP05
      title: IAM Groups
      description: |
        Ability to create, manage, list and delete IAM groups.
        IAM group is a collection of users, roles or other groups.
      group: Access
    - id: CCC.IAM.CP06
      title: IAM Roles / Service Principals
      description: |
        Ability to create, manage, list and delete IAM roles.
        IAM role is an identity for applications or services to
        access resources.
      group: Access
    - id: CCC.IAM.CP07
      title: Managed Identities
      description: |
        Identity assigned to cloud resources (e.g., VMs, Functions) which
        are managed by the cloud vendor.
      group: Access
    - id: CCC.IAM.CP08
      title: Federated Identity - SAML
      description: |
        Support for user authentication outside the cloud service
        provider using SAML. Authenticated federated identities can
        assume IAM roles.
      group: Access
    - id: CCC.IAM.CP09
      title: Federated Identity - OIDC
      description: |
        Support for user authentication outside the cloud service
        provider using OIDC. Authenticated federated identities can
        assume IAM roles.
      group: Access
    - id: CCC.IAM.CP10
      title: Custom Roles
      description: |
        Ability to create, manage, list and delete custom roles.
        Custom roles are user-defined roles that defines what
        actions are allowed.
      group: Access
    - id: CCC.IAM.CP11
      title: Resource-Level Access
      description: |
        Ability to restrict where actions are allowed, rather than
        the entire service. Defines the scope of the assignment.
      group: Access
    - id: CCC.IAM.CP12
      title: Policy Conditions
      description: |
        Ability to use conditions to add additional restrictions
        to the permission being granted. Allow access control rules
        to apply only when certain conditions are met.
      group: Access
    - id: CCC.IAM.CP13
      title: Temporary Credentials
      description: |
        Ability to grant short-lived security credentials that provide
        access to resources for a limited period of time. These credentials
        are typically issued for a specific session or task and expire
        after a predefined duration.
      group: Access
    - id: CCC.IAM.CP14
      title: Multi-Factor Authentication (MFA)
      description: |
        Support for enforcing MFA on user accounts and roles. Essential
        for securing root/admin users.
      group: Access
    - id: CCC.IAM.CP15
      title: Role Assumption / Delegation
      description: |
        Ability to temporarily assume another role or delegate access.
        Commonly used for user impersonation or temporary privilege
        elevation.
      group: Access
    - id: CCC.IAM.CP16
      title: Access Boundaries
      description: |
        Ability to define a boundary around the maximum effective permissions
        allowed for an identity at a higher level.
      group: Access
    - id: CCC.IAM.CP17
      title: Deny Permissions by Default
      description: |
        By default, no identity (user, group, role, service) has access to
        any resource, unless explicit permissions are granted.
      group: Access
    - id: CCC.IAM.CP18
      title: Audit Tooling
      description: |
        Provide tools to simulate or analyze permission used by a roles,
        and ability to export reports of who has access and whether it's
        being used, etc. These tools will increase the visibility,
        auditability and compliance of identities.
      group: Observability
groups:
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
imports:
