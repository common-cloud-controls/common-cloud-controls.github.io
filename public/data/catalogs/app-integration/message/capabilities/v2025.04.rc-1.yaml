title: CCC Messaging Capabilities
metadata:
    id: CCC.Message.CP
    type: ControlCatalog
    gemara-version: v2025.04.rc-1
    description: Capabilities for Messaging technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
capabilities:
    - id: CCC.Message.CP01
      title: Publish/Subscribe Model
      description: |
        Uses publish/subscribe (pub/sub) messaging service model for
        fan-out distribution of messages to multiple subscribers.
      group: ""
    - id: CCC.Message.CP02
      title: Message Storage Policies
      description: |
        Ability to control the region where messages are stored.
      group: ""
    - id: CCC.Message.CP03
      title: Creating Topics and Publish Messages
      description: |
        Ability to create new topics and publish messages to topics
      group: ""
    - id: CCC.Message.CP04
      title: List Topics
      description: |
        Ability to to list all existing topics.
      group: ""
    - id: CCC.Message.CP05
      title: Edit Topics
      description: |
        Ability to to edit properties of existing topics other than
        the topic name and ordering preference.
      group: ""
    - id: CCC.Message.CP06
      title: Delete Topics
      description: |
        Ability to to delete existing topics.
      group: ""
    - id: CCC.Message.CP07
      title: Subscribe to Topics and Receive messages
      description: |
        Ability to subscribe to topics and receive messages.
      group: ""
    - id: CCC.Message.CP08
      title: List Subscribers
      description: |
        Ability to list all subscribers for a given topics.
      group: ""
    - id: CCC.Message.CP09
      title: Edit Subscriber
      description: |
        Ability to edit subscriber properties such as subscription
        filter policies after subscriber is created.
      group: ""
    - id: CCC.Message.CP10
      title: Delete Subscribers
      description: |
        Ability to delete subscriber from a given topic.
      group: ""
    - id: CCC.Message.CP11
      title: FIFO Message Ordering
      description: |
        Support for first-in, first-out strictly preserved message
        ordering with exactly one message delivered.
      group: ""
    - id: CCC.Message.CP12
      title: Best Effort Message Ordering
      description: |
        Support for best-effort message ordering with at-least one
        message delivered.
      group: ""
    - id: CCC.Message.CP13
      title: Deduplication of Messages
      description: |
        Support for deduplication of messages with use of messaging
        service capabilities or deduplication IDs.
      group: ""
    - id: CCC.Message.CP14
      title: Dead Letter Topics
      description: |
        Supports dead-letter topics for handling messages that cannot be
        delivered or processed.
      group: ""
    - id: CCC.Message.CP15
      title: Access Policies
      description: |
        Ability to specify access policies on publishers and subscribers.
      group: ""
    - id: CCC.Message.CP16
      title: Message Filtering
      description: |
        Allows subscribers to receive subset of messages published to the
        subscribed topic based on attributes or content.
      group: ""
    - id: CCC.Message.CP17
      title: Message Retention
      description: |
        Ability to set message retention durations per topic.
      group: ""
imports:
    - entries:
        - reference-id: CCC.Core.CP01
          remarks: Encryption in Transit Enabled by Default
        - reference-id: CCC.Core.CP02
          remarks: Encryption at Rest Enabled by Default
        - reference-id: CCC.Core.CP04
          remarks: Transaction Rate Limits
        - reference-id: CCC.Core.CP06
          remarks: Access Control
        - reference-id: CCC.Core.CP07
          remarks: Event Publication
        - reference-id: CCC.Core.CP08
          remarks: Data Replication
        - reference-id: CCC.Core.CP09
          remarks: Metrics Publication
        - reference-id: CCC.Core.CP10
          remarks: Log Publication
        - reference-id: CCC.Core.CP14
          remarks: API Access
        - reference-id: CCC.Core.CP19
          remarks: Child Resource Scaling
        - reference-id: CCC.Core.CP20
          remarks: Resource Tagging
        - reference-id: CCC.Core.F23
          remarks: Network Access Rules
        - reference-id: CCC.Core.F28
          remarks: Command-line Interface
        - reference-id: CCC.Core.F29
          remarks: Active Ingestion
        - reference-id: CCC.Core.F31
          remarks: Elastic Scaling
      reference-id: CCC
