title: CCC Relational Database Capabilities
metadata:
    id: CCC.RDMS.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc5
    description: Capabilities for Relational Database technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2026.04-rc5
capabilities:
    - id: CCC.RDMS.CP01
      title: SQL Support
      description: |
        Properly handle queries in the SQL language.
      group: Data
    - id: CCC.RDMS.CP02
      title: DB Engine Option - MySQL
      description: |
        Ability to create a MySQL managed relational database.
      group: Data
    - id: CCC.RDMS.CP03
      title: DB Engine Option - PostgreSQL
      description: |
        Ability to create a PostgreSQL managed relational database.
      group: Data
    - id: CCC.RDMS.CP04
      title: DB Engine Option - MariaDB
      description: |
        Ability to create a MariaDB managed relational database.
      group: Data
    - id: CCC.RDMS.CP05
      title: DB Engine Option - SQL Server
      description: |
        Ability to create a Microsoft SQL Server managed relational database.
      group: Data
    - id: CCC.RDMS.CP06
      title: DB Managed Credentials
      description: |
        Ability to managed the database credentials using the cloud
        provider's secret management service.
      group: Access
    - id: CCC.RDMS.CP07
      title: DB Self Managed Credentials
      description: |
        Ability to manage the database credentials by client managed
        username and passwords.
      group: Access
    - id: CCC.RDMS.CP08
      title: Support for IPv4
      description: |
        Ability to connect to the database using IPv4 addresses.
      group: Networking
    - id: CCC.RDMS.CP09
      title: Support for IPv6
      description: |
        Ability to connect to the database using IPv6 addresses
      group: Networking
    - id: CCC.RDMS.CP10
      title: Public Access
      description: |
        Allow database to be accessed by public internet.
      group: Networking
    - id: CCC.RDMS.CP11
      title: Disable Public Access
      description: |
        Prevent database been accessed by public internet.
      group: Networking
    - id: CCC.RDMS.CP12
      title: Managed Connection Pooling
      description: |
        Ability to configure a managed connection pool for the database.
      group: Networking
    - id: CCC.RDMS.CP14
      title: Dedicated Database Instances
      description: |
        Option to deploy the database on a dedicated instance for
        isolation requirements.
      group: Compute
    - id: CCC.RDMS.CP15
      title: Horizontal Scaling
      description: |
        Read replicas of the primary database can be created.
      group: Data
    - id: CCC.RDMS.CP16
      title: Failover
      description: |
        Standby database can be implemented for failover when the
        primary can't be reached.
      group: Data
groups:
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Networking
      title: Networking
      description: |
        The Networking group covers entries related to network infrastructure,
        connectivity, and traffic management. This includes virtual networks, subnets,
        load balancing, DNS, routing, peering, and network-level access controls.
    - id: Compute
      title: Compute
      description: |
        The Compute group covers entries related to processing, execution,
        and runtime infrastructure. This includes CPU, memory, storage allocation,
        network ports, command-line interfaces, and elastic scaling.
