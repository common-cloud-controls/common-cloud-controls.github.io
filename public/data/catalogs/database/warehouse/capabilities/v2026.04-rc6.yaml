title: CCC Data Warehouse Capabilities
metadata:
    id: CCC.DataWar.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc6
    description: Capabilities for Data Warehouse technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2026.04-rc6
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
capabilities:
    - id: CCC.DataWar.CP01
      title: Centralized Data Repository
      description: |
        Acts as a centralized repository where data from various
        sources is consolidated, making it easier to manage and
        analyze large volumes of data.
      group: Data
    - id: CCC.DataWar.CP02
      title: Optimized Query Performance
      description: |
        Handles complex queries on large datasets efficiently using
        techniques such as indexing and partitioning.
      group: Data
    - id: CCC.DataWar.CP03
      title: Scalability
      description: |
        Ability to scale with growing data volumes and handle multiple
        queries simultaneously without compromising the performance.
      group: Resource
    - id: CCC.DataWar.CP04
      title: Column Storage
      description: |
        Stores data in columns rather than rows for efficient
        data retrieval.
      group: Data
    - id: CCC.DataWar.CP05
      title: SQL Based Querying
      description: |
        Supports SQL based querying on the data sets with specific
        enhancements and optimization for data warehousing.
      group: Data
    - id: CCC.DataWar.CP06
      title: Data Types
      description: |
        Ability to store processed structured and semi-structured
        data optimized for querying and analysis.
      group: Data
    - id: CCC.DataWar.CP07
      title: Massively Parallel Processing (MPP)
      description: |
        Distributes queries across multiple nodes for increased performance.
      group: Processing
    - id: CCC.DataWar.CP08
      title: Materialized Views
      description: |
        Ability to store results of a query into physical tables for faster
        data retrieval and improved query performance for complex queries.
      group: Data
    - id: CCC.DataWar.CP09
      title: Column-Level Security
      description: |
        Allows setting access policies at the column level to
        restrict access to sensitive data fields within tables.
      group: Access
    - id: CCC.DataWar.CP10
      title: Row-Level Security
      description: |
        Enables setting access policies at the row level to
        control access to subsets of data within a table based
        on user roles.
      group: Access
    - id: CCC.DataWar.CP11
      title: Integration with Data Sources
      description: |
        Seamless integration with various data sources such as object
        storage, relational and non-relational databases, data streams
        and data lakes.
      group: Ingestion
    - id: CCC.DataWar.CP12
      title: Integration with ETL
      description: |
        Integration with services that perform extract, transform and
        load data from various sources into the data warehouse. Unstructured
        data in transformed to structured or semi-structured data before
        ingestion to the data warehouse using ETL tools.
      group: Processing
    - id: CCC.DataWar.CP13
      title: Integration with ML
      description: |
        Build-in integration with machine learning services for enhanced
        processing of large volumes of complex data with ML models for
        predictive analytics, automated insights and more. ML can be used
        in data cleansing and transformation for improved data quality as well.
      group: MachineLearning
    - id: CCC.DataWar.CP14
      title: Real-time Metrics Publication
      description: |
        Ability to continuously track and analyze data as it is ingested,
        processed and stored to ensure data quality, operational efficiency,
        scalability and security.
      group: Observability
    - id: CCC.DataWar.CP15
      title: Cross-Region Replication
      description: |
        Ability to replicate data to multiple regions for high availability,
        disaster recovery and low-latency access.
      group: Data
    - id: CCC.DataWar.CP16
      title: View Creation and Access
      description: |
        Supports the creation of views (can be logical or material) to abstract
        and simplify access to underlying data. Views can be created with custom
        queries to expose subsets of data. These views are accessible by users
        and applications with appropriate permissions.
      group: Data
groups:
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
    - id: Processing
      title: Data Processing
      description: |
        The Data Processing group covers entries related to transforming,
        enriching, and moving data through pipelines. This includes ETL/ELT,
        stream and batch processing, data lineage, schema evolution, and
        workflow orchestration for data workloads.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Ingestion
      title: Ingestion
      description: |
        The Ingestion group covers entries related to how a service receives
        or retrieves data, inputs, or commands for processing. This includes both
        active (pull-based) and passive (push-based) ingestion patterns.
    - id: MachineLearning
      title: Machine Learning
      description: |
        The Machine Learning group covers entries related to building,
        training, deploying, and managing ML models and AI systems. This includes
        development environments, experiment tracking, model registries, inference,
        generative AI, prompt engineering, and model governance.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
