title: CCC Data Warehouse Threats
metadata:
    id: CCC.DataWar.TH
    type: ThreatCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc4
    description: Threats for Data Warehouse technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Threats
          title: CCC Core Threats
          version: v2026.04-rc4
groups:
    - id: ungrouped
      title: Ungrouped
      description: ""
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
imports:
    - entries:
        - reference-id: CCC.Core.TH01
          remarks: Access Control is Misconfigured
        - reference-id: CCC.Core.TH02
          remarks: Data is intercepted in transit
        - reference-id: CCC.Core.TH03
          remarks: Deployment region network is untrusted
        - reference-id: CCC.Core.TH04
          remarks: Data is replicated to untrusted or external locations
        - reference-id: CCC.Core.TH05
          remarks: Data is corrupted during replication
        - reference-id: CCC.Core.TH06
          remarks: Data is lost or corrupted
        - reference-id: CCC.Core.TH07
          remarks: Logs are Tampered With or Deleted
        - reference-id: CCC.Core.TH08
          remarks: Cost Management Data is Manipulated
        - reference-id: CCC.Core.TH09
          remarks: Logs or Monitoring Data are Read by Unauthorized Users
        - reference-id: CCC.Core.TH10
          remarks: Alerts are Intercepted
        - reference-id: CCC.Core.TH11
          remarks: Event Notifications are Incorrectly Triggered
        - reference-id: CCC.Core.TH12
          remarks: Resource constraints are exhausted
        - reference-id: CCC.Core.TH13
          remarks: Resource Tags Are Manipulated
        - reference-id: CCC.Core.TH14
          remarks: Older Resource Versions Are Exploited
        - reference-id: CCC.Core.TH15
          remarks: Automated Enumeration and Reconnaissance by Non-Human Entities
      reference-id: CCC.Core.Threats
threats:
    - id: CCC.DataWar.TH01
      title: Unauthorized Public Access to Datasets
      description: |
        Datasets may be unintentionally made publicly accessible,
        either at the dataset level or via IAM policies, allowing unauthorized users to read or modify sensitive data,
        leading to data breaches and compliance violations.
      group: Access
      capabilities:
        - entries:
            - reference-id: CCC.DataWar.CP01
          reference-id: CCC.DataWar.Capabilities
    - id: CCC.DataWar.TH02
      title: Data Exfiltration via Unauthorized Views
      description: |
        Attackers may create or exploit unauthorized views to access sensitive data without proper permissions,
        leading to data leakage.
      group: Data
      capabilities:
        - entries:
            - reference-id: CCC.DataWar.CP02
          reference-id: CCC.DataWar.Capabilities
    - id: CCC.DataWar.TH03
      title: Exposure of Sensitive Data through Inadequate Column-Level Security
      description: |
        Lack of proper column-level security can lead to unauthorized users accessing sensitive data fields,
        resulting in data breaches.
      group: Access
      capabilities:
        - entries:
            - reference-id: CCC.DataWar.CP03
          reference-id: CCC.DataWar.Capabilities
