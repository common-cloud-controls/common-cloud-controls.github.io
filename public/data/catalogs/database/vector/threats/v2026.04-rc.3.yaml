        - reference-id: CCC.Core.TH17
          remarks: Unauthorized Network Access via Misconfigured Rules
      reference-id: CCC.Core.Threats
threats:
    - id: CCC.Vector.TH01
      title: Embedding Extraction and Model Inversion
      description: Attackers may infer or reconstruct original data by probing vector similarity APIs, especially with unrestricted access. This enables model inversion attacks, membership inference, and unauthorized data leakage from stored embeddings.
      group: CCC.Core.Data
      capabilities:
        - entries:
            - reference-id: CCC.Vector.CP01
            - reference-id: CCC.Vector.CP03
            - reference-id: CCC.Vector.CP06
          reference-id: CCC.Vector.Capabilities
    - id: CCC.Vector.TH02
      title: Embedding and Index Poisoning
      description: Adversaries may insert malicious or adversarial vectors into the index through ingestion endpoints, polluting the dataset and degrading search quality, or subtly steering results toward specific outcomes.
      group: CCC.Core.Ingestion
      capabilities:
        - entries:
            - reference-id: CCC.Vector.CP02
            - reference-id: CCC.Vector.CP05
            - reference-id: CCC.Vector.CP07
          reference-id: CCC.Vector.Capabilities
    - id: CCC.Vector.TH03
      title: Cross-modal or Metadata Leakage
      description: Attackers may infer sensitive information through metadata filters or by correlating embeddings across modalities (e.g., voice and face), bypassing surface-level access controls.
      group: CCC.Core.Data
      capabilities:
        - entries:
            - reference-id: CCC.Vector.CP04
            - reference-id: CCC.Vector.CP10
          reference-id: CCC.Vector.Capabilities
    - id: CCC.Vector.TH04
      title: Index Corruption or Downgrade
      description: Attackers with unauthorized access or excessive permissions may tamper with or roll back index versions, potentially restoring poisoned data or breaking downstream integrations.
      group: CCC.Core.Resource
      capabilities:
        - entries:
            - reference-id: CCC.Vector.CP07
            - reference-id: CCC.Vector.CP11
          reference-id: CCC.Vector.Capabilities
    - id: CCC.Vector.TH05
      title: Embedding Format or Dimension Attacks
      description: Poor validation of embedding formats or dimensions can cause service crashes or logic errors. This can result in denial of service or incorrect similarity results.
      group: CCC.Core.Ingestion
      capabilities:
        - entries:
            - reference-id: CCC.Vector.CP08
            - reference-id: CCC.Vector.CP09
          reference-id: CCC.Vector.Capabilities
    - id: CCC.Vector.TH06
      title: Search Result Manipulation via ANN Bias
      description: Approximate nearest neighbor (ANN) algorithms may yield non-deterministic or biased results. Adversaries may exploit these differences to evade detection or bias AI responses.
      group: CCC.Core.Data
      capabilities:
        - entries:
            - reference-id: CCC.Vector.CP12
          reference-id: CCC.Vector.Capabilities
