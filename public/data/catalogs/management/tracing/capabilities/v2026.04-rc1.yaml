title: CCC Distributed Tracing Capabilities
metadata:
    id: CCC.Tracing.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc1
    description: Capabilities for Distributed Tracing technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2026.04-rc1
    applicability-groups:
        - id: tlp_red
          title: TLP:RED
          description: For the eyes and ears of individual recipients only, no further disclosure. Sources may use TLP:RED when information cannot be effectively acted upon without significant risk for the privacy, reputation, or operations of the organizations involved.
        - id: tlp_amber_strict
          title: TLP:AMBER+STRICT
          description: Limited disclosure, recipients can only spread this on a need-to-know basis within their organization only. Sources may use TLP:AMBER+STRICT when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organization.
        - id: tlp_amber
          title: TLP:AMBER
          description: Limited disclosure, recipients can spread this on a need-to-know basis within their organization and to its clients. Sources may use TLP:AMBER when information requires support to be effectively acted upon, yet carries risk to privacy, reputation, or operations if shared outside of the organizations involved.
        - id: tlp_green
          title: TLP:GREEN
          description: Limited disclosure, recipients can spread this within their community. Sources may use TLP:GREEN when information is useful to increase awareness within their wider community.
        - id: tlp_clear
          title: TLP:CLEAR
          description: Recipients can spread this to the world, there is no limit on disclosure. Sources may use TLP:CLEAR when information carries minimal or no foreseeable risk of misuse, in accordance with applicable rules and procedures for public release.
capabilities:
    - id: CCC.Tracing.CP01
      title: Distributed Telemetry Collection
      description: |
        Collects end-to-end telemetry (spans, segments, and trace events) from
        instrumented applications and infrastructure, and aggregates them into
        complete request flows that reveal execution paths, behavior, and
        performance across distributed systems.
      group: Observability
    - id: CCC.Tracing.CP02
      title: Dependency Mapping and Visualization
      description: |
        Automatically builds visual or logical graphs of upstream and
        downstream dependencies (services, functions, databases, external
        endpoints), showing call relationships, traffic patterns, and health
        signals to clarify how requests traverse the system.
      group: Observability
    - id: CCC.Tracing.CP03
      title: Distributed Context Propagation
      description: |
        Propagates trace and span identifiers across service boundaries using
        standardized headers/protocols so operations for the same request can
        be correlated across asynchronous calls and heterogeneous runtimes.
      group: Observability
    - id: CCC.Tracing.CP04
      title: Performance Profiling
      description: |
        Analyzes trace data to surface runtime characteristics such asexecution
        durations, slow operations, bottlenecks, and regressions for providing
        granular insight into identifying bottlenecks inside distributed workflows.
      group: Observability
    - id: CCC.Tracing.CP05
      title: Error Correlation
      description: |
        Detects errors, exceptions, faults, and retry patterns within spans and
        correlates them to affected request paths so users can pinpoint the
        component and operation causing failures.
      group: Observability
    - id: CCC.Tracing.CP06
      title: Sampling
      description: |
        Provides configurable sampling strategies such as rules-based, rate-based,
        and adaptive to control trace volume and balance observability needs with
        cost and system performance.
      group: Observability
    - id: CCC.Tracing.CP07
      title: Trace Querying & Filtering
      description: |
        Offers a query and filtering interface to retrieve traces by latency,
        error status, service name, operation, tag values, time windows, and
        other attributes to isolate behaviours or anomalies quickly.
      group: Observability
    - id: CCC.Tracing.CP08
      title: Integration with Logs and Metrics
      description: |
        Correlates traces with logs and metrics from related resources to
        provide unified observability; users can pivot between telemetry types
        using shared identifiers (e.g., trace or span IDs).
      group: Observability
    - id: CCC.Tracing.CP09
      title: Trace Retention
      description: |
        Stores trace data for configurable retention periods and supports
        time-to-live policies driven by workload needs, cost constraints, or
        compliance requirements.
      group: Observability
    - id: CCC.Tracing.CP10
      title: Assistance for Root Cause Analysis
      description: |
        Analyzes trace patterns, latency anomalies, and error flows to surface
        likely sources of failures or performance degradation and highlight
        trends or problematic components to accelerate diagnosis and remediation.
      group: Observability
groups:
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
