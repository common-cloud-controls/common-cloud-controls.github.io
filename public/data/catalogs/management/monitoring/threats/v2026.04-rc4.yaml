title: CCC Monitoring Threats
metadata:
    id: CCC.Monitor.TH
    type: ThreatCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc4
    description: Threats for Monitoring technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Threats
          title: CCC Core Threats
          version: v2026.04-rc4
groups:
    - id: ungrouped
      title: Ungrouped
      description: ""
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Compute
      title: Compute
      description: |
        The Compute group covers entries related to processing, execution,
        and runtime infrastructure. This includes CPU, memory, storage allocation,
        network ports, command-line interfaces, and elastic scaling.
imports:
    - entries:
        - reference-id: CCC.Core.TH01
          remarks: Access Control is Misconfigured
        - reference-id: CCC.Core.TH07
          remarks: Logs are Tampered With or Deleted
        - reference-id: CCC.Core.TH08
          remarks: Cost Management Data is Manipulated
        - reference-id: CCC.Core.TH09
          remarks: Logs or Monitoring Data are Read by Unauthorized Users
        - reference-id: CCC.Core.TH10
          remarks: Alerts are Intercepted
        - reference-id: CCC.Core.TH11
          remarks: Event Notifications are Incorrectly Triggered
        - reference-id: CCC.Core.TH15
          remarks: Automated Enumeration and Reconnaissance by Non-human Entities
        - reference-id: CCC.Core.TH16
          remarks: Logging and Monitoring are Disabled
      reference-id: CCC.Core.Threats
threats:
    - id: CCC.Monitor.TH01
      title: Capture Personal Identifiable Information
      description: |
        Unauthorised viewers may get access to PII if it is incorrectly collected by
        monitoring systems through metrics or tracing.
      group: Data
      capabilities:
        - entries:
            - reference-id: CCC.Monitoring.CP01
              remarks: Metric collection
            - reference-id: CCC.Monitoring.CP02
              remarks: Tracing
            - reference-id: CCC.Monitoring.CP08
              remarks: Application Performance Monitoring (APM)
            - reference-id: CCC.Monitoring.CP09
              remarks: Dashboard
            - reference-id: CCC.Monitoring.CP11
              remarks: Integration with Third-Party Tools
          reference-id: CCC.Monitoring.Capabilities
    - id: CCC.Monitor.TH02
      title: Health Checks Used to Identify Attack Targets
      description: |
        Health Checks are used to inform those responsible for maintaining a system that
        there is a problem, but if that information gets into the hands of a malicious
        actor, it can be used to target already problematic systems and mask malicious activity.
      group: Observability
      capabilities:
        - entries:
            - reference-id: CCC.Monitoring.CP04
              remarks: Health Checks
          reference-id: CCC.Monitoring.Capabilities
    - id: CCC.Monitor.TH03
      title: External Monitoring DoS
      description: |
        If an external monitoring service is compromised, it can act as a host for
        instigating denial of service attacks on internal system which otherwise may
        not be protected against this form of attack.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.Monitoring.CP06
              remarks: Synthetic Monitoring
          reference-id: CCC.Monitoring.Capabilities
    - id: CCC.Monitor.TH04
      title: External Monitoring Access
      description: |
        If an external monitoring system is compromised, it acts as a trusted external
        remote service and can then access internal services which would otherwise not
        be accessible directly.
      group: Access
      capabilities:
        - entries:
            - reference-id: CCC.Monitoring.CP06
              remarks: Synthetic Monitoring
          reference-id: CCC.Monitoring.Capabilities
    - id: CCC.Monitor.TH05
      title: Data Exfiltration Through Tampered Metrics
      description: |
        If a malicious actor is able to make changes to the metrics being collected, it could
        be used to encrypt and or compress sensitive data and bypass controls preventing
        exfiltration. The data can then be staged in the monitoring system and exfiltrated in
        bulk at a later point in time
      group: Data
      capabilities:
        - entries:
            - reference-id: CCC.Monitoring.CP01
              remarks: Metric collection
            - reference-id: CCC.Monitoring.CP11
              remarks: Integration with Third-Party Tools
          reference-id: CCC.Monitoring.Capabilities
    - id: CCC.Monitor.TH06
      title: Cost Exhaustion Through Tampered Alerts or Metrics Collection
      description: |
        Monitoring systems are expected to generate traffic, but it a malicious actor were to
        change alerts that were being fired at an API which charged per requests or generate
        large volumes of metric data which would then need to be stored and processed, or even
        triggering resource scaling, this would cause an increase in cloud bill.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.Monitoring.CP01
              remarks: Metric collection
            - reference-id: CCC.Monitoring.CP11
              remarks: Integration with Third-Party Tools
          reference-id: CCC.Monitoring.Capabilities
    - id: CCC.Monitor.TH07
      title: Trigger Malicious Code
      description: |
        If a malicious actor is able to create new triggers, they would be able to use valid
        metric data to trigger malicious actions and re-compromise a newly replaced container
        or compute instance.
      group: Compute
      capabilities:
        - entries:
            - reference-id: CCC.Monitoring.CP01
              remarks: Metric collection
            - reference-id: CCC.Monitoring.CP10
              remarks: Triggering
            - reference-id: CCC.Monitoring.CP11
              remarks: Integration with Third-Party Tools
          reference-id: CCC.Monitoring.Capabilities
