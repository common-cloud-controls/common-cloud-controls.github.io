        - reference-id: CCC.Core.CP14
          remarks: API Access
        - reference-id: CCC.Core.CP15
          remarks: Cost Management
        - reference-id: CCC.Core.CP17
          remarks: Alerting
      reference-id: CCC.Core.Capabilities
