title: CCC Logging Threats
metadata:
    id: CCC.Logging.TH
    type: ThreatCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc.3
    description: Threats for Logging technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Threats
          title: CCC Core Threats
          version: v2026.04-rc.3
groups:
    - id: ungrouped
      title: Ungrouped
      description: ""
    - id: CCC.Core.Observability
      title: Observability
      description: |
        The Observability group covers controls, threats, and capabilities related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
    - id: CCC.Core.Data
      title: Data Resilience
      description: |
        The Data Resilience group covers controls, threats, and capabilities related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
    - id: CCC.Core.Ingestion
      title: Ingestion
      description: |
        The Ingestion group covers capabilities related to how a service receives
        or retrieves data, inputs, or commands for processing. This includes both
        active (pull-based) and passive (push-based) ingestion patterns.
imports:
    - entries:
        - reference-id: CCC.Core.TH01
          remarks: Access Control is Misconfigured
        - reference-id: CCC.Core.TH02
          remarks: Data is Intercepted in Transit
        - reference-id: CCC.Core.TH03
          remarks: Deployment Region Network is Untrusted
        - reference-id: CCC.Core.TH04
          remarks: Data is Replicated to Untrusted or External Locations
        - reference-id: CCC.Core.TH05
          remarks: Data is Corrupted During Replication
        - reference-id: CCC.Core.TH06
          remarks: Data is Lost or Corrupted
        - reference-id: CCC.Core.TH07
          remarks: Logs are Tampered With or Deleted
        - reference-id: CCC.Core.TH09
          remarks: Logs or Monitoring Data are Read by Unauthorized Users
        - reference-id: CCC.Core.TH10
          remarks: Alerts are Intercepted
        - reference-id: CCC.Core.TH11
          remarks: Event Notifications are Incorrectly Triggered
        - reference-id: CCC.Core.TH12
          remarks: Resource Constraints are Exhausted
        - reference-id: CCC.Core.TH13
          remarks: Resource Tags are Manipulated
        - reference-id: CCC.Core.TH14
          remarks: Older Resource Versions are Exploited
        - reference-id: CCC.Core.TH15
          remarks: Automated Enumeration and Reconnaissance by Non-Human Entities
        - reference-id: CCC.Core.TH16
          remarks: Logging and Monitoring are Disabled
        - reference-id: CCC.Core.TH17
          remarks: Unauthorized Network Access via Misconfigured Rules
      reference-id: CCC.Core.Threats
threats:
    - id: CCC.Logging.TH01
      title: Log Ingestion Performance Degradation
      description: |
        The logging service's ingestion pipeline experiences performance
        degradation due to overwhelming log volumes, network bottlenecks, or
        inefficient processing, leading to delayed availability of log data for
        analysis and potential log loss if buffers overflow.
      group: CCC.Core.Observability
      capabilities:
        - entries:
            - reference-id: CCC.Logging.CP03
              remarks: Real-Time Log Ingestion
            - reference-id: CCC.Logging.CP04
              remarks: Centralised Log Collection
            - reference-id: CCC.Logging.CP06
              remarks: Log Filtering & Transformation
          reference-id: CCC.Logging
    - id: CCC.Logging.TH02
      title: Unauthorized Data Transfer Out of a Trusted Boundary
      description: |
        Sensitive log data, including PII, financial transaction details,
        or system vulnerabilities, is exfiltrated directly from the
        logging service's query or API interfaces by authorized but malicious
        insiders or compromised accounts exploiting legitimate access.
      group: CCC.Core.Data
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP06
              remarks: Access Control
            - reference-id: CCC.Core.CP14
              remarks: API Access
          reference-id: CCC.Core.Capabilities
        - entries:
            - reference-id: CCC.Core.CP22
              remarks: Location Lock-In
          reference-id: CCC.Logging
    - id: CCC.Logging.TH03
      title: Log Schema or Format Drift
      description: |
        Changes in source application or cloud service log formats, schemas,
        or underlying data structures lead to parsing failures, incomplete
        log ingestion, or render existing queries and dashboards ineffective,
        hindering comprehensive analysis.
      group: CCC.Core.Observability
      capabilities:
        - entries:
            - reference-id: CCC.Logging.CP05
              remarks: Custom Log Format Support
            - reference-id: CCC.Logging.CP06
              remarks: Log Filtering & Transformation
            - reference-id: CCC.Logging.CP11
              remarks: Log-based Metrics
          reference-id: CCC.Logging
    - id: CCC.Logging.TH04
      title: Inadequate Log Anonymization/Masking
      description: |
        Sensitive data (e.g., PII, secrets, authentication tokens) is ingested
        into logs without proper anonymization, masking, or redaction at source
        or during ingestion. This creates a significant data exposure risk,
        particularly for data not intended for broad log access.
      group: CCC.Core.Data
      capabilities:
        - entries:
            - reference-id: CCC.Logging.CP06
              remarks: Log Filtering & Transformation
            - reference-id: CCC.Logging.CP08
              remarks: Retention Policies
          reference-id: CCC.Logging
    - id: CCC.Logging.TH05
      title: Log Retention Policy Evasion or Misconfiguration
      description: |
        Log data is deleted prematurely or retained longer than legally required
        due to misconfigured retention policies, manual overrides, or evasion
        tactics. This can lead to non-compliance with regulatory requirements
        or loss of critical forensic evidence.
      group: CCC.Core.Observability
      capabilities:
        - entries:
            - reference-id: CCC.Logging.CP07
              remarks: Immutable Storage
            - reference-id: CCC.Logging.CP08
              remarks: Retention Policies
            - reference-id: CCC.Logging.CP12
              remarks: Log Archiving
          reference-id: CCC.Logging
    - id: CCC.Logging.TH06
      title: Log Injection
      description: |
        User-supplied data such as scripts, control characters, escape sequences,
        or code fragments may be written to logs without proper encoding or sanitization.
        This can result in malformed or unexpected log entries that could disrupt or
        compromise systems that process or display these logs, including log viewers
        or downstream services.
      group: CCC.Core.Ingestion
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP10
              remarks: Logging
            - reference-id: CCC.Logging.CP01
              remarks: Service Log Capture
            - reference-id: CCC.Logging.CP02
              remarks: Application Log Ingestion
          reference-id: CCC.Logging
    - id: CCC.Logging.TH07
      title: Insufficient Logging
      description: |
        If security-critical actions are not logged, it becomes more difficult to
        detect threats and conduct post-incident analysis.
      group: CCC.Core.Observability
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP10
              remarks: Logging
            - reference-id: CCC.Logging.CP01
              remarks: Service Log Capture
            - reference-id: CCC.Logging.CP02
              remarks: Application Log Ingestion
          reference-id: CCC.Logging
