title: CCC Audit Logging Capabilities
metadata:
    id: CCC.AuditLog.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc4
    description: Capabilities for Audit Logging technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2026.04-rc4
capabilities:
    - id: CCC.AuditLog.CP01
      title: Default Retention Period
      description: |
        Cloud providers support a default minimum retention of audit log data.
      group: Observability
    - id: CCC.AuditLog.CP02
      title: Export
      description: |
        Support for manual "one off" exporting or downloading of raw log events.
      group: Observability
    - id: CCC.AuditLog.CP03
      title: Sink
      description: |
        Ability to continually stream audit log data to a hosted storage bucket or data lake solution.
      group: Observability
    - id: CCC.AuditLog.CP04
      title: Event Types
      description: |
        Audit events are generated with different data types to provide specific fields for the system
        which generated the event, such as Management Event, Data Event and  Policy Event.
      group: Observability
    - id: CCC.AuditLog.CP05
      title: Time Search
      description: |
        Ability to search for audit events across a specific time range.
      group: Observability
    - id: CCC.AuditLog.CP06
      title: Filtering
      description: |
        Ability to filter audit events based on specific attribute.
      group: Observability
    - id: CCC.AuditLog.CP07
      title: Immutable Log Entries
      description: |
        Audit Log events are immutable and cannot be altered or deleted once generated.
      group: Observability
    - id: CCC.AuditLog.CP08
      title: External Sink
      description: |
        Audit log events can be configured to be sent to a external SIEM or data analysis
        provider outside of the cloud platform.
      group: Observability
groups:
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
imports:
    - entries:
        - reference-id: CCC.Core.CP01
          remarks: Encryption in Transit Enabled by Default
        - reference-id: CCC.Core.CP02
          remarks: Encryption at Rest Enabled by Default
        - reference-id: CCC.Core.CP03
          remarks: Access Log Publication
        - reference-id: CCC.Core.CP06
          remarks: Access Control
        - reference-id: CCC.Core.CP07
          remarks: Event Publication
        - reference-id: CCC.Core.CP08
          remarks: Data Replication
        - reference-id: CCC.Core.CP09
          remarks: Metrics Publication
        - reference-id: CCC.Core.CP10
          remarks: Log Publication
        - reference-id: CCC.Core.CP14
          remarks: API Access
        - reference-id: CCC.Core.CP17
          remarks: Alerting
      reference-id: CCC.Core.Capabilities
