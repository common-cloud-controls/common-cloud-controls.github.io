title: CCC ML Development Environments Controls
metadata:
    id: CCC.MLDE.CN
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc5
    description: Controls for ML Development Environments technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Controls
          title: CCC Core Controls
          version: v2026.04-rc5
controls:
    - id: CCC.MLDE.CN01
      title: Define Access Mode for ML Development Environments
      objective: |
        Ensure that access to Machine Learning Development Environment (MLDE)
        resources is strictly defined and controlled.
        Only authorized users with appropriate permissions can access these environments,
        mitigating the risk of unauthorized access, data leakage, or service disruption.
      group: Access
      assessment-requirements:
        - id: CCC.MLDE.CN01.AR01
          text: |
            Verify that only authorized users can access MLDE resources,
            and that access modes are properly defined and enforced.
          applicability:
            - tlp-red
            - tlp-amber
            - tlp-green
            - tlp-clear
          state: Active
      state: Active
    - id: CCC.MLDE.CN03
      title: Disable Root Access on MLDE Instances
      objective: |
        Prevent users from obtaining root access on MLDE instances to reduce the
        risk of unauthorized system modifications and potential security breaches.
      group: Access
      assessment-requirements:
        - id: CCC.MLDE.CN03.AR01
          text: |
            Verify that root access is disabled on MLDE instances containing sensitive data.
          applicability:
            - tlp-red
          state: Active
        - id: CCC.MLDE.CN03.AR02
          text: |
            For MLDE instances without sensitive data, ensure that root access is only
            enabled when necessary and properly authorized.
          applicability:
            - tlp-red
            - tlp-amber
            - tlp-green
            - tlp-clear
          state: Active
      state: Active
    - id: CCC.MLDE.CN04
      title: Disable Terminal Access on MLDE Instances
      objective: |
        Prevent users from accessing the terminal on MLDE instances to limit the risk of
        unauthorized commands and potential system compromise.
      group: Access
      assessment-requirements:
        - id: CCC.MLDE.CN04.AR01
          text: |
            Verify that terminal access is disabled on MLDE instances containing sensitive data.
          applicability:
            - tlp-red
          state: Active
        - id: CCC.MLDE.CN04.AR02
          text: |
            For MLDE instances without sensitive data, ensure that terminal access is only
            enabled when necessary and properly authorized.
          applicability:
            - tlp-red
            - tlp-amber
            - tlp-green
            - tlp-clear
          state: Active
      state: Active
    - id: CCC.MLDE.CN02
      title: Disable File Downloads on MLDE Instances
      objective: |
        Prevent unauthorized file downloads from MLDE instances to protect sensitive data from being exfiltrated.
      group: Data
      assessment-requirements:
        - id: CCC.MLDE.CN02.AR01
          text: |
            Confirm that file download functionality is disabled on MLDE instances containing sensitive data.
          applicability:
            - tlp-red
          state: Active
        - id: CCC.MLDE.CN02.AR02
          text: |
            For MLDE instances without sensitive data, ensure that file downloads are monitored and logged.
          applicability:
            - tlp-red
            - tlp-amber
            - tlp-green
            - tlp-clear
          state: Active
      state: Active
    - id: CCC.MLDE.CN05
      title: Restrict Environment Options on MLDE Instances
      objective: |
        Limit the virtual machine and container image options available when creating
        new MLDE instances to approved and secure configurations.
      group: Compute
      assessment-requirements:
        - id: CCC.MLDE.CN05.AR01
          text: |
            Verify that only approved VM and container images can be selected when creating MLDE instances.
          applicability:
            - tlp-red
            - tlp-amber
          state: Active
        - id: CCC.MLDE.CN05.AR02
          text: |
            Attempt to create an MLDE instance with an unapproved image and confirm that it is denied.
          applicability:
            - tlp-red
          state: Active
      state: Active
    - id: CCC.MLDE.CN06
      title: Require Automatic Scheduled Upgrades on User-Managed MLDE Instances
      objective: |
        Ensure that MLDE instances are kept up-to-date with the
        latest security patches by enforcing automatic scheduled upgrades.
      group: Resource
      assessment-requirements:
        - id: CCC.MLDE.CN06.AR01
          text: |
            Verify that automatic scheduled upgrades are enabled on user-managed
            MLDE instances containing sensitive data.
          applicability:
            - tlp-red
          state: Active
        - id: CCC.MLDE.CN06.AR02
          text: |
            Ensure that the upgrade schedule is appropriately configured and
            does not interfere with critical operations.
          applicability:
            - tlp-red
            - tlp-amber
            - tlp-green
            - tlp-clear
          state: Active
      state: Active
    - id: CCC.MLDE.CN07
      title: Restrict Public IP Access on MLDE Instances
      objective: |
        Prevent public IP access to MLDE instances to reduce exposure to the internet and enhance security.
      group: Access
      assessment-requirements:
        - id: CCC.MLDE.CN07.AR01
          text: |
            Verify that MLDE instances containing sensitive data cannot be accessed via public IP addresses.
          applicability:
            - tlp-red
          state: Active
        - id: CCC.MLDE.CN07.AR02
          text: |
            For MLDE instances without sensitive data requiring public access,
            ensure that appropriate security controls are in place and access is approved.
          applicability:
            - tlp-red
            - tlp-amber
            - tlp-green
            - tlp-clear
          state: Active
      state: Active
    - id: CCC.MLDE.CN08
      title: Restrict Virtual Networks for MLDE Instances
      objective: |
        Limit the virtual networks that can be used when creating new MLDE instances to
        ensure they are deployed within approved and secure network environments.
      group: Access
      assessment-requirements:
        - id: CCC.MLDE.CN08.AR01
          text: |
            Verify that MLDE instances containing sensitive data can only be deployed in
            approved virtual networks with appropriate security controls.
          applicability:
            - tlp-red
          state: Active
        - id: CCC.MLDE.CN08.AR02
          text: |
            Ensure that MLDE instances without sensitive data are deployed in
            networks that meet organizational security standards.
          applicability:
            - tlp-red
            - tlp-amber
            - tlp-green
            - tlp-clear
          state: Active
      state: Active
groups:
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
    - id: Compute
      title: Compute
      description: |
        The Compute group covers entries related to processing, execution,
        and runtime infrastructure. This includes CPU, memory, storage allocation,
        network ports, command-line interfaces, and elastic scaling.
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
imports:
    - entries:
        - reference-id: CCC.Core.CN01
          remarks: Prevent unencrypted requests
        - reference-id: CCC.Core.CN02
          remarks: Ensure data encryption at rest for all stored data
        - reference-id: CCC.Core.CN03
          remarks: Implement multi-factor authentication (MFA) for access
        - reference-id: CCC.Core.CN04
          remarks: Log all access and changes
        - reference-id: CCC.Core.CN05
          remarks: Prevent access from untrusted entities
        - reference-id: CCC.Core.CN06
          remarks: Prevent deployment in restricted regions
      reference-id: CCC.Core.Controls
