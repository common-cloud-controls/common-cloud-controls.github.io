title: CCC Generative AI Controls
metadata:
    id: CCC.GenAI.CN
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc5
    description: Controls for Generative AI technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Controls
          title: CCC Core Controls
          version: v2026.04-rc5
controls:
    - id: CCC.GenAI.CN01
      title: Model Input Filtering and Sanitisation
      objective: |
        Inspect and validate input before it is passed to a GenAI
        model in order to filter or sanitise adversarial queries
        and prevent sensitive data leakage.
      group: Ingestion
      assessment-requirements:
        - id: CCC.GenAI.CN01.AR01
          text: |
            Untrusted input such as user queries, RAG data or tool output
            MUST be validated before it is passed to a GenAI model.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
        - id: CCC.GenAI.CN01.AR02
          text: |
            If malicious patterns such as prompt injection or sensitive
            data are detected during input validation, the input MUST
            be blocked or sanitised.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
    - id: CCC.GenAI.CN02
      title: Model Output Filtering and Sanitisation
      objective: |
        Inspect and validate GenAI model output before passing it to
        users, applications or plugins in order to filter or sanitise
        insecure or unreliable output and prevent sensitive data leakage.
      group: Ingestion
      assessment-requirements:
        - id: CCC.GenAI.CN02.AR01
          text: |
            GenAI model output MUST be validated for format conformance,
            malicious patterns, sensitive data and inapropriate content
            before being passed to users, application or plugins.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
        - id: CCC.GenAI.CN02.AR02
          text: |
            In the event of policy violations, the AI-generated content MUST
            be redacted, encoded or rejected.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
    - id: CCC.GenAI.CN03
      title: Data Provenance and Source Vetting
      objective: |
        Ensure that all data for training, fine-tuning or RAG comes
        from trusted, approved sources and is authorised for the
        intended purposes in order to prevent the initial introduction
        of malicious content or leaked sensitive data.
      group: Ingestion
      assessment-requirements:
        - id: CCC.GenAI.CN03.AR01
          text: |
            When data is designated for model training or RAG ingestion, then its
            source MUST be explicitly approved and its provenance documented.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
        - id: CCC.GenAI.CN03.AR02
          text: |
            Data from unvetted sources MUST NOT be used in production systems.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
    - id: CCC.GenAI.CN04
      title: Sanitisation of Ingested Data
      objective: |
        Validate and sanitise all data ingested by GenAI systems
        from extenal sources or internal knowledge bases, whether
        for training, conversion to vector embeddings, or real-time
        retireval, in order to remove or redact poisoned or sensitive
        data before further processing.
      group: Ingestion
      assessment-requirements:
        - id: CCC.GenAI.CN04.AR01
          text: |
            When data is ingested for training, fine-tuning or conversion
            to vector embeddings, it MUST be validated for sensitive
            information or malicious content.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
        - id: CCC.GenAI.CN04.AR02
          text: |
            If sensitive data or malicious content is detected, it must
            be rejected, redacted or flagged for manual review.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
    - id: CCC.GenAI.CN05
      title: Citations and Source Traceability
      objective: |
        Require the GenAI system to provide citations or direct links
        back to the source documents used to generate a response, in
        to enhance the transparency, trustworthiness, and verifiability
        of AI-generated content.
      group: Observability
      assessment-requirements:
        - id: CCC.GenAI.CN05.AR01
          text: |
            When a RAG-enabled system generates a response containing information
            retrieved from its knowledge base, then the response MUST include a
            verifiable citation that links back to the specific source document.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
    - id: CCC.GenAI.CN06
      title: Least Privilege for Plugins
      objective: |
        Restricts the permissions of any external tools the GenAI system
        can call to limit the potential damage if an agent is coerced
        to perform unintended actions or vulnerabilities in the tools
        are exploited.
      group: Access
      assessment-requirements:
        - id: CCC.GenAI.CN06.AR01
          text: |
            When an LLM invokes an external tool (e.g., an API, a plugin),
            then the tool MUST operate with the least privileges required
            for performing its intended functionality.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
    - id: CCC.GenAI.CN07
      title: Model Version Pinning
      objective: |
        Mandate that applications are locked ("pinned") to a specific,
        tested version of a foundational model to prevent unexpected
        behaviour changes introduced by provider-side updates.
      group: MachineLearning
      assessment-requirements:
        - id: CCC.GenAI.CN07.AR01
          text: |
            When an application makes an API call to a foundational model in a
            production environment, then it MUST specify an explicit version
            identifier.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
    - id: CCC.GenAI.CN08
      title: Quality Control and Red Teaming
      objective: |
        Establish a formal program for quality evaluation and adversarial
        testing (red teaming) to ensure GenAI system meet all business,
        quality, security and compliance requirements before getting deployed
        into production environments.
      group: MachineLearning
      assessment-requirements:
        - id: CCC.GenAI.CN08.AR01
          text: |
            When a new AI model is considered for production deployment, it
            MUST undergo a formal red teaming and quality assurance review.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
        - id: CCC.GenAI.CN08.AR02
          text: |
            If model quality review or red teaming identifies an issue that exceeds
            the organization's risk tolerance, the model MUST NOT be deployed until
            the issue is remediated.
          applicability:
            - tlp-clear
            - tlp-green
            - tlp-amber
            - tlp-red
          state: Active
      state: Active
groups:
    - id: Ingestion
      title: Ingestion
      description: |
        The Ingestion group covers entries related to how a service receives
        or retrieves data, inputs, or commands for processing. This includes both
        active (pull-based) and passive (push-based) ingestion patterns.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to
        logging, monitoring, metrics, alerting, and event publication. This includes
        audit trail integrity, enumeration detection, and protection against tampering
        or unauthorized access to operational telemetry.
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to
        authentication, authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access rules, and
        prevention of unauthorized access or reconnaissance.
    - id: MachineLearning
      title: Machine Learning
      description: |
        The Machine Learning group covers entries related to building,
        training, deploying, and managing ML models and AI systems. This includes
        development environments, experiment tracking, model registries, inference,
        generative AI, prompt engineering, and model governance.
