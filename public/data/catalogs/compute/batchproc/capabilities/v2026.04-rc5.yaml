title: CCC Batch Processing Capabilities
metadata:
    id: CCC.BatchProc.CP
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc5
    description: Capabilities for Batch Processing technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Capabilities
          title: CCC Core Capabilities
          version: v2026.04-rc5
capabilities:
    - id: CCC.BatchProc.CP01
      title: Data Processing
      description: |
        Processing large volumes of data or time consuming operations in batches (groups)
        without requiring user interaction during execution.
      group: Processing
    - id: CCC.BatchProc.CP02
      title: Job Scheduling
      description: |
        Allows workloads to be executed base on a schedules.
      group: Orchestration
    - id: CCC.BatchProc.CP03
      title: Event Triggers
      description: |
        Allows workloads to be executed base on an event.
      group: Orchestration
    - id: CCC.BatchProc.CP04
      title: Manual Triggers
      description: |
        Ability to trigger a job manually when needed.
      group: Orchestration
    - id: CCC.BatchProc.CP05
      title: Dynamic Resource Allocation
      description: |
        Automatically provision computing resources based on job requirements at the start
        of execution and deallocate them once the job is completed.
      group: Resource
    - id: CCC.BatchProc.CP06
      title: VPC Support
      description: |
        Ability to deploy compute resources in your VPC for network isolation.
      group: Networking
    - id: CCC.BatchProc.CP07
      title: Job Definitions
      description: |
        Defines job configurations, including compute resources, environment variables,
        and execution parameters.
      group: Orchestration
    - id: CCC.BatchProc.CP08
      title: Job Queues
      description: |
        Ability to organize jobs into queues with execution priorities.
      group: Orchestration
    - id: CCC.BatchProc.CP09
      title: Job Dependencies
      description: |
        Ability to define dependencies between jobs to execute them in a specific order.
      group: Orchestration
    - id: CCC.BatchProc.CP10
      title: Job Orchestration
      description: |
        Ability to coordinate and manage the execution of multiple jobs to ensure they run
        in order based on conditions to meet performance or business requirements.
      group: Orchestration
    - id: CCC.BatchProc.CP11
      title: Multinode Parallel Jobs
      description: |
        Support for running HPC (High Performance Computing) workloads that
        span multiple computing instances.
      group: Compute
    - id: CCC.BatchProc.CP12
      title: Array Jobs
      description: |
        Ability to run a single job across multiple data inputs or parameters concurrently.
      group: Compute
    - id: CCC.BatchProc.CP13
      title: Container Support
      description: |
        Native support for containerized workloads using Docker containers.
      group: Compute
    - id: CCC.BatchProc.CP14
      title: Retry Policy
      description: |
        Ability to configure retry logic for failed jobs.
      group: Orchestration
    - id: CCC.BatchProc.CP15
      title: Integration with Data Sources and Sinks
      description: |
        Seamlessly integrates with various data sources (for reading inputs) and
        data sinks (for storing outputs) such as object storage, databases,
        data streams and data warehouses.
      group: Data
    - id: CCC.BatchProc.CP16
      title: List Jobs
      description: |
        Ability to list the jobs with their job status such as succeeded, failed,
        running, pending or submitted.
      group: Resource
    - id: CCC.BatchProc.CP17
      title: Cancel Jobs
      description: |
        Ability to cancel jobs that are in submitted, pending or runnable states.
      group: Resource
    - id: CCC.BatchProc.CP18
      title: Terminate Jobs
      description: |
        Ability to terminate jobs that are already running.
      group: Resource
groups:
    - id: Processing
      title: Data Processing
      description: |
        The Data Processing group covers entries related to transforming,
        enriching, and moving data through pipelines. This includes ETL/ELT,
        stream and batch processing, data lineage, schema evolution, and
        workflow orchestration for data workloads.
    - id: Orchestration
      title: Orchestration
      description: |
        The Orchestration group covers entries related to coordinating and
        managing workloads across distributed systems. This includes container
        orchestration, job scheduling, CI/CD pipelines, build automation, and
        service mesh management.
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
    - id: Networking
      title: Networking
      description: |
        The Networking group covers entries related to network infrastructure,
        connectivity, and traffic management. This includes virtual networks, subnets,
        load balancing, DNS, routing, peering, and network-level access controls.
    - id: Compute
      title: Compute
      description: |
        The Compute group covers entries related to processing, execution,
        and runtime infrastructure. This includes CPU, memory, storage allocation,
        network ports, command-line interfaces, and elastic scaling.
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to
        ensuring data availability, integrity, and sovereignty across its lifecycle.
        This includes replication, backup, recovery, region restrictions, and protection
        against data loss or corruption.
