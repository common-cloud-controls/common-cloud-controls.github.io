title: CCC Serverless Computing Controls
metadata:
    id: CCC.SvlsComp.CN
    type: ControlCatalog
    gemara-version: v1.0.0
    version: v2026.04-rc4
    description: Controls for Serverless Computing technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
    mapping-references:
        - id: CCC.Core.Controls
          title: CCC Core Controls
          version: v2026.04-rc4
controls:
    - id: CCC.SvlsComp.CN01
      title: Enforce Use of Private Endpoints for Serverless Function
      objective: |
        Ensure that the serverless function is accessible only through a private endpoint,
        allowing it to communicate securely within a virtual private network and preventing
        unauthorized external access.
      group: Networking
      assessment-requirements:
        - id: CCC.SvlsComp.CN01.AR01
          text: |
            Attempt to access the serverless function over the public internet and verify that access is denied.
          applicability:
            - tlp-red
            - tlp-amber
          state: Active
      state: Active
    - id: CCC.SvlsComp.CN02
      title: Implement Function Invocation Rate Limits
      objective: |
        Ensure that function invocation is limited to a specified threshold from any single entity,
        preventing resource exhaustion and denial of service attacks.
      group: Resource
      assessment-requirements:
        - id: CCC.SvlsComp.CN02.AR01
          text: |
            Send requests to invoke the function up to the allowed threshold and confirm they
            are successful; then send additional requests exceeding the threshold from the same
            entity and verify that they are denied.
          applicability:
            - tlp-red
            - tlp-amber
          state: Active
      state: Active
groups:
    - id: Networking
      title: Networking
      description: |
        The Networking group covers entries related to network infrastructure,
        connectivity, and traffic management. This includes virtual networks, subnets,
        load balancing, DNS, routing, peering, and network-level access controls.
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to
        the lifecycle, configuration, and operational integrity of cloud resources.
        This includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
imports:
    - entries:
        - reference-id: CCC.Core.CN01
          remarks: Prevent unencrypted requests
        - reference-id: CCC.Core.CN02
          remarks: Ensure data encryption at rest for all stored data
        - reference-id: CCC.Core.CN03
          remarks: Implement multi-factor authentication (MFA) for access
        - reference-id: CCC.Core.CN04
          remarks: Log all access and changes
        - reference-id: CCC.Core.CN05
          remarks: Prevent access from untrusted entities
        - reference-id: CCC.Core.CN06
          remarks: Prevent deployment in restricted regions
        - reference-id: CCC.Core.CN07
          remarks: Alert on non-human enumeration
        - reference-id: CCC.Core.CN09
          remarks: Prevent tampering, deletion, or unauthorized access to access logs
        - reference-id: CCC.Core.CN10
          remarks: Prevent data replication to destinations outside of defined trust perimeter
      reference-id: CCC.Core.Controls
